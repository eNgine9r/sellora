name: Sprint 8A.1 Browser Mobile QA

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/staging_browser_mobile_qa.py"
      - ".github/workflows/sprint-8a1-browser-mobile-qa.yml"

permissions:
  contents: read

concurrency:
  group: sellora-sprint-8a1-browser-mobile-qa
  cancel-in-progress: false

jobs:
  browser-mobile-qa:
    name: Browser/mobile staging QA
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
      STAGING_OWNER_EMAIL: ${{ secrets.STAGING_OWNER_EMAIL }}
      STAGING_OWNER_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}
      STAGING_TEST_WORKSPACE_ID: ${{ secrets.STAGING_TEST_WORKSPACE_ID }}
      STAGING_SECOND_WORKSPACE_ID: ${{ secrets.STAGING_SECOND_WORKSPACE_ID }}
      STAGING_MANAGER_EMAIL: ${{ secrets.STAGING_MANAGER_EMAIL }}
      STAGING_ANALYST_EMAIL: ${{ secrets.STAGING_ANALYST_EMAIL }}
    steps:
      - name: Checkout temporary QA branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate safety inputs
        shell: bash
        run: |
          set -euo pipefail
          test -n "${STAGING_FRONTEND_URL}"
          test -n "${STAGING_OWNER_EMAIL}"
          test -n "${STAGING_OWNER_PASSWORD}"
          test -n "${STAGING_TEST_WORKSPACE_ID}"
          echo "Required browser QA inputs are present. Secrets suppressed."

      - name: Warm staging frontend
        shell: bash
        run: |
          set +e
          for attempt in $(seq 1 6); do
            code="$(curl -sS -o /tmp/frontend.html -w "%{http_code}" --max-time 20 "$STAGING_FRONTEND_URL/login" || true)"
            echo "Warm-up attempt $attempt: frontend=$code"
            if [[ "$code" =~ ^(200|301|302|307|308)$ ]]; then exit 0; fi
            sleep 8
          done
          echo "Frontend warm-up did not return 2xx/3xx" >&2
          exit 1

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Compile browser QA runner
        run: python -m py_compile scripts/staging_browser_mobile_qa.py

      - name: Execute browser/mobile QA matrix
        run: python scripts/staging_browser_mobile_qa.py

      - name: Validate sanitized browser QA evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/browser-mobile-qa/browser-mobile-qa-report.json
          test -f artifacts/browser-mobile-qa/browser-mobile-qa-report.md
          if grep -R "${STAGING_OWNER_PASSWORD}" artifacts/browser-mobile-qa; then
            echo "Password leaked into browser QA artifacts" >&2
            exit 1
          fi
          if grep -R "Bearer " artifacts/browser-mobile-qa; then
            echo "Bearer token leaked into browser QA artifacts" >&2
            exit 1
          fi
          if grep -R "authorization" artifacts/browser-mobile-qa; then
            echo "Authorization header leaked into browser QA artifacts" >&2
            exit 1
          fi

      - name: Upload sanitized browser QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8a1-browser-mobile-qa-${{ github.run_id }}
          path: artifacts/browser-mobile-qa
          if-no-files-found: error
          retention-days: 7

      - name: Publish browser QA summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json, os, pathlib
          path = pathlib.Path('artifacts/browser-mobile-qa/browser-mobile-qa-report.json')
          lines = ['## Sprint 8A.1 Browser/Mobile QA']
          if path.exists():
              report = json.loads(path.read_text())
              lines.append(f"- Decision: **{report.get('decision', 'UNKNOWN')}**")
              lines.append(f"- Failures: **{report.get('summary', {}).get('fail_count', 'unknown')}**")
              lines.append(f"- Warnings: **{report.get('summary', {}).get('warn_count', 'unknown')}**")
              lines.append(f"- Refresh requests: **{report.get('summary', {}).get('refresh_requests', 'unknown')}**")
          else:
              lines.append('- Artifact: **MISSING**')
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as f:
              f.write('\n'.join(lines) + '\n')
          PY
