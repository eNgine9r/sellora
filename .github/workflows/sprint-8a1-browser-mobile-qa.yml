name: Sprint 8A.1 Browser Mobile QA

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/staging_browser_mobile_qa_v2.py"
      - "scripts/staging_browser_mobile_qa_v4.py"
      - "scripts/staging_browser_mobile_qa_v5.py"
      - ".github/workflows/sprint-8a1-browser-mobile-qa.yml"

permissions:
  contents: read

concurrency:
  group: sellora-sprint-8a1-browser-mobile-qa
  cancel-in-progress: true

jobs:
  browser-mobile-qa:
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    env:
      STAGING_FRONTEND_URL: https://sellora-web-staging.vercel.app
      STAGING_OWNER_EMAIL: ${{ secrets.STAGING_OWNER_EMAIL }}
      STAGING_OWNER_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}
      STAGING_TEST_WORKSPACE_ID: ${{ secrets.STAGING_TEST_WORKSPACE_ID }}
      STAGING_TEST_WORKSPACE_NAME: Sellora QA — Sprint 8A.1
      STAGING_SECOND_WORKSPACE_ID: f0b99e15-ea02-4a11-a800-3ffd77e02684
      STAGING_SECOND_WORKSPACE_NAME: Sellora QA — Browser B 20260713

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate secure inputs
        run: |
          python - <<'PY'
          import os, re
          required = ["STAGING_FRONTEND_URL", "STAGING_OWNER_EMAIL", "STAGING_OWNER_PASSWORD", "STAGING_TEST_WORKSPACE_ID", "STAGING_SECOND_WORKSPACE_ID"]
          if any(not os.getenv(name) for name in required): raise SystemExit("Missing browser QA input")
          for name in ("STAGING_TEST_WORKSPACE_ID", "STAGING_SECOND_WORKSPACE_ID"):
              if not re.fullmatch(r"[0-9a-fA-F-]{36}", os.environ[name]): raise SystemExit(f"Invalid UUID: {name}")
          if os.environ["STAGING_TEST_WORKSPACE_ID"] == os.environ["STAGING_SECOND_WORKSPACE_ID"]: raise SystemExit("QA workspaces must differ")
          print("Secure input preflight: PASS")
          PY

      - name: Warm frontend
        run: |
          set +e
          for attempt in $(seq 1 4); do
            code="$(curl -sS -o /tmp/login.html -w "%{http_code}" --max-time 15 "$STAGING_FRONTEND_URL/login" || true)"
            echo "Frontend warm-up $attempt: $code"
            [[ "$code" =~ ^(200|301|302|307|308)$ ]] && break
            sleep 5
          done
          exit 0

      - name: Install Playwright Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Compile runners
        run: |
          python -m py_compile scripts/staging_browser_mobile_qa_v2.py
          python -m py_compile scripts/staging_browser_mobile_qa_v4.py
          python -m py_compile scripts/staging_browser_mobile_qa_v5.py

      - name: Execute browser/mobile matrix
        run: |
          set +e
          mkdir -p artifacts/browser-mobile-qa
          python scripts/staging_browser_mobile_qa_v5.py > artifacts/browser-mobile-qa/console.log 2>&1
          echo "$?" > artifacts/browser-mobile-qa/exit-code.txt
          exit 0

      - name: Validate sanitized evidence
        if: always()
        run: |
          python - <<'PY'
          import json, os, pathlib, re
          root = pathlib.Path("artifacts/browser-mobile-qa")
          report_path = root / "browser-mobile-qa-report.json"
          md_path = root / "browser-mobile-qa-report.md"
          console_path = root / "console.log"
          if not report_path.exists() or not md_path.exists(): raise SystemExit("Browser QA report missing")
          texts = [(p.name, p.read_text(encoding="utf-8", errors="replace")) for p in (report_path, md_path, console_path) if p.exists()]
          leaks = []
          for label, value in {"OWNER_EMAIL": os.getenv("STAGING_OWNER_EMAIL", ""), "OWNER_PASSWORD": os.getenv("STAGING_OWNER_PASSWORD", "")}.items():
              if value:
                  for filename, text in texts:
                      if value in text: leaks.append(f"{label} in {filename}")
          patterns = [
              re.compile(r"Bearer\s+[A-Za-z0-9._~+/=-]{20,}", re.I),
              re.compile(r"\beyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b"),
              re.compile(r"\bsk-[A-Za-z0-9_-]{12,}\b", re.I),
          ]
          for filename, text in texts:
              for pattern in patterns:
                  if pattern.search(text): leaks.append(f"token pattern in {filename}")
          if leaks: raise SystemExit("Sanitization FAIL: " + ", ".join(leaks))
          report = json.loads(report_path.read_text(encoding="utf-8"))
          if report.get("decision") != "PASS":
              print(json.dumps(report.get("findings", []), ensure_ascii=False, indent=2))
              raise SystemExit("Browser/mobile gate is not PASS")
          print("Sanitized evidence: PASS")
          PY

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8a1-browser-mobile-qa-${{ github.run_id }}
          path: artifacts/browser-mobile-qa
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce gate
        if: always()
        run: |
          code="$(cat artifacts/browser-mobile-qa/exit-code.txt 2>/dev/null || echo 99)"
          [ "$code" = "0" ] || exit 1
          python - <<'PY'
          import json
          report = json.load(open("artifacts/browser-mobile-qa/browser-mobile-qa-report.json", encoding="utf-8"))
          if report.get("decision") != "PASS": raise SystemExit(1)
          print("BROWSER/MOBILE QA GATE: PASS")
          PY
