name: Bootstrap frontend warning cleanup

on:
  push:
    branches:
      - fix/clear-frontend-build-warnings

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/clear-frontend-build-warnings
          fetch-depth: 0

      - name: Enable one-time cleanup and remove bootstrap
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/fix-frontend-warnings.yml')
          text = workflow.read_text(encoding='utf-8')
          line = "    if: github.actor != 'github-actions[bot]'\n"
          if line not in text:
              raise SystemExit('Expected workflow guard was not found')
          workflow.write_text(text.replace(line, '', 1), encoding='utf-8')
          Path('.github/workflows/bootstrap-frontend-warning-cleanup.yml').unlink()
          PY

          git config user.name "sellora-fix-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Enable frontend warning cleanup"
          git push origin HEAD:fix/clear-frontend-build-warnings
