name: Sprint 8B Backend Route Verification

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/sprint-8b-backend-route-verification.yml"

permissions:
  contents: read

jobs:
  verify-backend-package:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Verify Alembic and capture Sprint 8B route diagnostics
        working-directory: backend
        shell: bash
        run: |
          set +e
          mkdir -p ../artifacts/sprint-8b-route-verifier
          python scripts/verify_alembic_revision.py > ../artifacts/sprint-8b-route-verifier/alembic.log 2>&1
          alembic_code=$?
          python scripts/verify_sprint_8b_routes.py > ../artifacts/sprint-8b-route-verifier/routes.log 2>&1
          routes_code=$?
          echo "$alembic_code" > ../artifacts/sprint-8b-route-verifier/alembic-exit.txt
          echo "$routes_code" > ../artifacts/sprint-8b-route-verifier/routes-exit.txt
          exit 0
      - name: Upload verifier diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sprint-8b-route-verifier-${{ github.run_id }}
          path: artifacts/sprint-8b-route-verifier
          if-no-files-found: error
          retention-days: 7
      - name: Enforce verifier result
        shell: bash
        run: |
          test "$(cat artifacts/sprint-8b-route-verifier/alembic-exit.txt)" = "0"
          test "$(cat artifacts/sprint-8b-route-verifier/routes-exit.txt)" = "0"
      - name: Run onboarding/demo/security tests
        working-directory: backend
        run: |
          pytest \
            tests/onboarding/test_demo_workspace_service.py \
            tests/onboarding/test_onboarding_status.py \
            tests/security/test_endpoint_inventory.py \
            tests/security/test_workspace_injection.py \
            -q
