name: Sprint 8B Backend Route Verification

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/sprint-8b-backend-route-verification.yml"

permissions:
  contents: read

jobs:
  verify-backend-package:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Verify Alembic and Sprint 8B routes
        working-directory: backend
        run: |
          python scripts/verify_alembic_revision.py
          python scripts/verify_sprint_8b_routes.py
      - name: Run onboarding/demo/security tests
        working-directory: backend
        run: |
          pytest \
            tests/onboarding/test_demo_workspace_service.py \
            tests/onboarding/test_onboarding_status.py \
            tests/security/test_endpoint_inventory.py \
            tests/security/test_workspace_injection.py \
            -q
