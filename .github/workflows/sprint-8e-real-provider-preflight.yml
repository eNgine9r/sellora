name: Sprint 8E Real Provider Preflight

on:
  pull_request:
    branches: [main]
    paths:
      - "qa/sprint_8e_real_provider_preflight.py"
      - ".github/workflows/sprint-8e-real-provider-preflight.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sprint-8e-real-provider-preflight
  cancel-in-progress: true

jobs:
  provider-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_FRONTEND_URL: https://sellora-web-staging.vercel.app
      EXPECTED_RUNTIME_COMMIT: 096e27762bf6952e2b5df8cb3199c2f402de0d4b
      QA8E_WORKSPACE_ID: 5ae30ca3-a4d7-4cc1-8bba-335f2b8c1ef4
      STAGING_OWNER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'EMAIL')] }}
      STAGING_OWNER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'PASSWORD')] }}
      STAGING_MANAGER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'MANAGER', 'EMAIL')] }}
      STAGING_MANAGER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'MANAGER', 'PASSWORD')] }}
      STAGING_ANALYST_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'ANALYST', 'EMAIL')] }}
      STAGING_ANALYST_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'ANALYST', 'PASSWORD')] }}
      STAGING_NOVA_POSHTA_API_KEY: ${{ secrets[format('STAGING_NOVA_POSHTA_{0}', 'API_KEY')] }}
      STAGING_NOVA_POSHTA_SENDER_CITY_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'CITY', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_WAREHOUSE_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'WAREHOUSE', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_COUNTERPARTY_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'COUNTERPARTY', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_CONTACT_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'CONTACT', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_PHONE: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}', 'PHONE')] }}

    steps:
      - name: Checkout QA-only branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QA dependency
        run: python -m pip install --disable-pip-version-check httpx==0.28.1

      - name: Refine real-provider evidence probes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("qa/sprint_8e_real_provider_preflight.py")
          text = path.read_text(encoding="utf-8")

          old_mask = 'bool(saved.get("masked_api_key")) and real_key not in json.dumps(saved, ensure_ascii=False),'
          new_mask = '''bool(saved.get("masked_api_key")) and str(saved.get("masked_api_key")).startswith("****") and str(saved.get("masked_api_key")) != real_key,
              {
                  "masked_present": bool(saved.get("masked_api_key")),
                  "masked_format": str(saved.get("masked_api_key") or "").startswith("****"),
                  "raw_equal": str(saved.get("masked_api_key") or "") == real_key,
              },'''
          old_empty = "f\"qa8e-no-city-{datetime.now(UTC).strftime('%H%M%S')}\""
          new_empty = '"НемаєТакогоМістаАбсолютно"'

          if old_mask not in text:
              raise SystemExit("Masking probe expression not found")
          if old_empty not in text:
              raise SystemExit("No-result city probe expression not found")

          text = text.replace(old_mask, new_mask, 1)
          text = text.replace(old_empty, new_empty, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Compile preflight runner
        run: python -m py_compile qa/sprint_8e_real_provider_preflight.py

      - name: Warm Render runtime
        run: |
          curl -fsSL --retry 8 --retry-all-errors --retry-delay 10 --max-time 90 \
            "$STAGING_API_URL/health" >/tmp/qa8e-health.json
          python - <<'PY'
          import json
          from pathlib import Path
          health = json.loads(Path('/tmp/qa8e-health.json').read_text(encoding='utf-8'))
          if health.get('status') != 'ok':
              raise SystemExit('Backend health is not ok')
          print(json.dumps({
              'status': health.get('status'),
              'runtime_commit': health.get('runtime_commit'),
              'process_started_at': health.get('process_started_at'),
          }, indent=2))
          PY

      - name: Execute real-provider preflight without provider writes
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/sprint-8e
          python qa/sprint_8e_real_provider_preflight.py
          code=$?
          echo "$code" > artifacts/sprint-8e/preflight-exit-code.txt
          exit 0

      - name: Validate sanitized preflight evidence
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("artifacts/sprint-8e/preflight.json")
          if not path.exists():
              raise SystemExit("Sprint 8E preflight artifact missing")
          report = json.loads(path.read_text(encoding="utf-8"))
          print(json.dumps({
              "decision": report.get("decision"),
              "check_count": len(report.get("checks", [])),
              "provider_document_created": report.get("provider_document_created"),
              "network": report.get("network"),
          }, indent=2))
          if report.get("provider_document_created") is not False:
              raise SystemExit("Preflight unexpectedly created a provider document")
          PY

      - name: Upload sanitized preflight evidence
        if: always() && hashFiles('artifacts/sprint-8e/preflight.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8e-real-provider-preflight-${{ github.run_id }}
          path: |
            artifacts/sprint-8e/preflight.json
            artifacts/sprint-8e/preflight-exit-code.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce preflight decision
        if: always()
        run: |
          code="$(cat artifacts/sprint-8e/preflight-exit-code.txt 2>/dev/null || echo 99)"
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("artifacts/sprint-8e/preflight.json")
          if not path.exists():
              raise SystemExit("Sprint 8E preflight report missing")
          report = json.loads(path.read_text(encoding="utf-8"))
          if report.get("decision") != "PASS":
              raise SystemExit(f"Sprint 8E preflight decision: {report.get('decision')}")
          PY
          test "$code" = "0"
