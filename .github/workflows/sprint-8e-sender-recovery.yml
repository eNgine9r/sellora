name: Sprint 8E Sender Recovery

on:
  pull_request:
    branches: [main]
    paths:
      - "qa/sprint_8e_sender_recovery.py"
      - ".github/workflows/sprint-8e-sender-recovery.yml"

permissions:
  contents: read

concurrency:
  group: sprint-8e-sender-recovery
  cancel-in-progress: false

jobs:
  sender-recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_FRONTEND_URL: https://sellora-web-staging.vercel.app
      EXPECTED_RUNTIME_COMMIT: 44c2e1f85d72cb2c818d9468ad5287cbba5257ed
      QA8E_WORKSPACE_ID: 5ae30ca3-a4d7-4cc1-8bba-335f2b8c1ef4
      NOVA_POSHTA_API_URL: https://api.novaposhta.ua/v2.0/json/
      STAGING_OWNER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'EMAIL')] }}
      STAGING_OWNER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'PASSWORD')] }}
      STAGING_MANAGER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'MANAGER', 'EMAIL')] }}
      STAGING_MANAGER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'MANAGER', 'PASSWORD')] }}
      STAGING_ANALYST_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'ANALYST', 'EMAIL')] }}
      STAGING_ANALYST_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'ANALYST', 'PASSWORD')] }}
      STAGING_NOVA_POSHTA_API_KEY: ${{ secrets[format('STAGING_NOVA_POSHTA_{0}', 'API_KEY')] }}
      STAGING_NOVA_POSHTA_SENDER_CITY_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'CITY', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_WAREHOUSE_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'WAREHOUSE', 'REF')] }}

    steps:
      - name: Checkout guarded QA branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependency
        run: python -m pip install --disable-pip-version-check httpx==0.28.1

      - name: Compile sender recovery
        run: python -m py_compile qa/sprint_8e_sender_recovery.py

      - name: Verify exact Render runtime
        run: |
          curl -fsSL --retry 8 --retry-all-errors --retry-delay 10 --max-time 120 \
            "$STAGING_API_URL/health" > /tmp/qa8e-health.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          health = json.loads(Path('/tmp/qa8e-health.json').read_text(encoding='utf-8'))
          commit = str(health.get('runtime_commit') or '').lower()
          expected = os.environ['EXPECTED_RUNTIME_COMMIT'].lower()
          print(json.dumps({
              'status': health.get('status'),
              'runtime_commit': commit,
              'process_started_at': health.get('process_started_at'),
          }, indent=2))
          if health.get('status') != 'ok' or not commit.startswith(expected[:12]):
              raise SystemExit('Unexpected Render runtime')
          PY

      - name: Execute guarded sender recovery
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/sprint-8e
          python qa/sprint_8e_sender_recovery.py
          code=$?
          echo "$code" > artifacts/sprint-8e/sender-recovery-exit-code.txt
          exit 0

      - name: Validate sanitized recovery evidence
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('artifacts/sprint-8e/sender-recovery.json').read_text(encoding='utf-8'))
          network = report.get('network') or {}
          print(json.dumps({
              'decision': report.get('decision'),
              'check_count': len(report.get('checks', [])),
              'provider_document_expected': report.get('provider_document_expected'),
              'provider_save_requests': network.get('provider_save_requests'),
              'settings_writes': network.get('settings_writes'),
              'reconcile_requests': network.get('reconcile_requests'),
              'create_ttn_requests': network.get('create_ttn_requests'),
              'provider_errors': report.get('provider_errors'),
              'restart_required': report.get('restart_required'),
              'cleanup_required': report.get('cleanup_required'),
              'safe_error': report.get('safe_error'),
          }, indent=2))
          if int(network.get('provider_save_requests') or 0) > 1:
              raise SystemExit('Provider save budget exceeded')
          if int(network.get('settings_writes') or 0) > 1:
              raise SystemExit('Settings write budget exceeded')
          PY

      - name: Upload sender recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8e-sender-recovery-${{ github.run_id }}
          path: |
            artifacts/sprint-8e/sender-recovery.json
            artifacts/sprint-8e/sender-recovery-exit-code.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce sender recovery decision
        if: always()
        run: |
          code="$(cat artifacts/sprint-8e/sender-recovery-exit-code.txt 2>/dev/null || echo 99)"
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('artifacts/sprint-8e/sender-recovery.json').read_text(encoding='utf-8'))
          network = report.get('network') or {}
          if report.get('decision') != 'PASS_PENDING_RESTART_AND_CLEANUP':
              raise SystemExit(f"Sender recovery decision: {report.get('decision')}")
          if report.get('provider_document_expected') != 1:
              raise SystemExit('Exactly one provider document was not confirmed')
          if network.get('provider_save_requests') != 1:
              raise SystemExit('Expected exactly one provider save request')
          if network.get('settings_writes') != 1:
              raise SystemExit('Expected exactly one settings write')
          if report.get('restart_required') is not True or report.get('cleanup_required') is not True:
              raise SystemExit('Restart and cleanup boundary not armed')
          PY
          test "$code" = "0"
