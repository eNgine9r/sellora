name: Instagram History Visibility Revalidation

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/instagram-history-visibility-revalidation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sellora-instagram-history-visibility-revalidation
  cancel-in-progress: false

jobs:
  verify-visible-dialog-accounting:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: staging
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_OWNER_EMAIL: ${{ secrets.STAGING_OWNER_EMAIL }}
      STAGING_OWNER_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate staging credentials
        shell: bash
        run: |
          test -n "${STAGING_OWNER_EMAIL:-}"
          test -n "${STAGING_OWNER_PASSWORD:-}"

      - name: Re-run history sync and verify visible dialog accounting
        shell: bash
        run: |
          mkdir -p artifacts
          python - <<'PY'
          import json
          import os
          import time
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          api = f"{os.environ['STAGING_API_URL'].rstrip('/')}/api/v1"

          def request(path, *, method="GET", token=None, workspace=None, body=None, timeout=30):
              headers = {"Accept": "application/json"}
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              if workspace:
                  headers["X-Workspace-ID"] = workspace
              data = None
              if body is not None:
                  data = json.dumps(body).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              req = Request(f"{api}{path}", data=data, method=method, headers=headers)
              try:
                  with urlopen(req, timeout=timeout) as response:
                      raw = response.read().decode("utf-8")
                      return response.status, json.loads(raw) if raw else {}
              except HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  try:
                      payload = json.loads(raw) if raw else {}
                  except json.JSONDecodeError:
                      payload = {"detail": "non-json response"}
                  return exc.code, payload
              except (URLError, TimeoutError) as exc:
                  return 0, {"detail": exc.__class__.__name__}

          code, tokens = request(
              "/auth/login",
              method="POST",
              body={
                  "email": os.environ["STAGING_OWNER_EMAIL"],
                  "password": os.environ["STAGING_OWNER_PASSWORD"],
              },
          )
          if code != 200 or not tokens.get("access_token"):
              raise SystemExit(f"Staging OWNER login failed with HTTP {code}")
          token = tokens["access_token"]

          code, current_user = request("/auth/me", token=token)
          if code != 200:
              raise SystemExit(f"Staging /auth/me failed with HTTP {code}")

          evidence = {
              "connected_workspace_count": 0,
              "conversations_discovered": 0,
              "conversations_synced": 0,
              "visible_instagram_dialogs": 0,
              "messages_unavailable": 0,
              "history_sync_status": None,
          }

          for membership in current_user.get("memberships") or []:
              workspace_id = str(membership.get("workspace_id") or "")
              if not workspace_id:
                  continue
              code, status = request(
                  "/integrations/instagram/status",
                  token=token,
                  workspace=workspace_id,
              )
              if code != 200 or status.get("status") != "CONNECTED":
                  continue
              evidence["connected_workspace_count"] += 1

              code, sync = request(
                  "/direct/history-sync",
                  method="POST",
                  token=token,
                  workspace=workspace_id,
                  body={"conversation_limit": 100, "messages_per_conversation": 20},
              )
              if code != 200:
                  raise SystemExit(f"History sync request failed with HTTP {code}")

              for _ in range(120):
                  code, sync = request(
                      "/direct/history-sync",
                      token=token,
                      workspace=workspace_id,
                  )
                  if code == 200 and sync.get("status") in {"COMPLETED", "PARTIAL", "FAILED_SAFE"}:
                      break
                  time.sleep(5)
              else:
                  raise SystemExit("History sync did not reach a terminal status")

              if sync.get("status") == "FAILED_SAFE":
                  raise SystemExit(f"History sync failed safely: {sync.get('last_error_code') or 'UNKNOWN'}")

              code, conversations = request(
                  "/direct/conversations",
                  token=token,
                  workspace=workspace_id,
              )
              if code != 200 or not isinstance(conversations, list):
                  raise SystemExit(f"Direct conversation listing failed with HTTP {code}")

              visible = sum(1 for item in conversations if item.get("channel") == "INSTAGRAM")
              discovered = int(sync.get("conversations_discovered") or 0)
              synchronized = int(sync.get("conversations_synced") or 0)
              if synchronized > visible:
                  raise SystemExit(
                      f"False history visibility accounting: synchronized={synchronized}, visible={visible}"
                  )
              if synchronized > discovered:
                  raise SystemExit(
                      f"Invalid history counters: synchronized={synchronized}, discovered={discovered}"
                  )

              evidence.update(
                  conversations_discovered=discovered,
                  conversations_synced=synchronized,
                  visible_instagram_dialogs=visible,
                  messages_unavailable=int(sync.get("messages_unavailable") or 0),
                  history_sync_status=sync.get("status"),
              )

          if evidence["connected_workspace_count"] == 0:
              raise SystemExit("No connected Instagram workspace available")

          with open("artifacts/instagram-history-visibility.json", "w", encoding="utf-8") as file:
              json.dump(evidence, file, indent=2, ensure_ascii=False)
          print(json.dumps(evidence, ensure_ascii=False))
          PY

      - name: Validate sanitized evidence
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          secrets = [
              os.getenv("STAGING_OWNER_EMAIL", ""),
              os.getenv("STAGING_OWNER_PASSWORD", ""),
          ]
          for path in Path("artifacts").glob("**/*"):
              if not path.is_file():
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              for secret in secrets:
                  if secret and secret in text:
                      raise SystemExit(f"Secret leaked into evidence: {path}")
          print("Sanitized visibility evidence: PASS")
          PY

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-instagram-history-visibility-${{ github.run_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: 7
