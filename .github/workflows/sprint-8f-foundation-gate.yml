name: Sprint 8F Foundation Gate

on:
  pull_request:
    paths:
      - "backend/app/utils/phone.py"
      - "backend/app/models/customer_address.py"
      - "backend/app/models/integration_connection.py"
      - "backend/app/schemas/customer.py"
      - "backend/app/schemas/crm_completion.py"
      - "backend/app/schemas/integration.py"
      - "backend/app/schemas/shipment.py"
      - "backend/app/services/crm_completion_service.py"
      - "backend/app/services/nova_poshta_service.py"
      - "backend/app/services/nova_poshta_provider_service.py"
      - "backend/app/integrations/nova_poshta_client.py"
      - "backend/alembic/versions/202607160023_sprint_8f_foundation.py"
      - "backend/tests/test_phone.py"
      - "backend/tests/test_crm_completion.py"
      - "backend/tests/test_nova_poshta.py"
      - "backend/tests/test_sprint_8f_foundation_migration.py"
      - "backend/tests/integrations/nova_poshta/test_real_provider_payload.py"
      - "backend/tests/integrations/nova_poshta/test_durable_ttn_workflow.py"
      - "backend/scripts/sprint_8f_migration_gate.py"
      - ".github/workflows/sprint-8f-foundation-gate.yml"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sellora_test
          POSTGRES_USER: sellora
          POSTGRES_PASSWORD: sellora
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U sellora -d sellora_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://sellora:sellora@localhost:5432/sellora_test
      SECRET_KEY: ci-secret
      JWT_SECRET: ci-jwt-secret
      STAGING_NOVA_POSHTA_ALLOW_WRITES: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile backend
        run: |
          cd backend
          python -m compileall app
      - name: Focused Sprint 8F tests
        run: |
          cd backend
          pytest \
            tests/test_phone.py \
            tests/test_crm_completion.py \
            tests/test_nova_poshta.py \
            tests/test_sprint_8f_foundation_migration.py \
            tests/security/test_endpoint_inventory.py \
            tests/security/test_tenant_object_isolation.py \
            -q
      - name: Full backend suite
        run: |
          cd backend
          pytest tests -q
      - name: PostgreSQL Alembic migration gate
        run: |
          cd backend
          python scripts/sprint_8f_migration_gate.py
