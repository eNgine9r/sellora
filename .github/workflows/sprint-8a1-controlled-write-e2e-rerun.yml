name: Sprint 8A.1 Controlled-write E2E Rerun

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/staging_controlled_write_e2e_rerun.py"
      - ".github/workflows/sprint-8a1-controlled-write-e2e-rerun.yml"

permissions:
  contents: read

concurrency:
  group: sellora-sprint-8a1-controlled-write-rerun
  cancel-in-progress: false

jobs:
  controlled-write-e2e-rerun:
    name: Controlled-write staging E2E rerun
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      STAGING_FRONTEND_URL: https://sellora-web-staging.vercel.app
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_OWNER_EMAIL: ${{ secrets.STAGING_OWNER_EMAIL }}
      STAGING_OWNER_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}
      STAGING_ANALYST_EMAIL: ${{ secrets.STAGING_ANALYST_EMAIL }}
      STAGING_ANALYST_PASSWORD: ${{ secrets.STAGING_ANALYST_PASSWORD }}
      STAGING_TEST_WORKSPACE_ID: ${{ secrets.STAGING_TEST_WORKSPACE_ID }}
      STAGING_EXPECTED_ALEMBIC_REVISION: "202607130021"
      STAGING_RUNTIME_ALEMBIC_REVISION: "202607130021"
      STAGING_ALLOW_CONTROLLED_WRITES: "true"

    steps:
      - name: Checkout temporary QA branch
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate safety inputs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import uuid

          required = [
              "STAGING_OWNER_EMAIL",
              "STAGING_OWNER_PASSWORD",
              "STAGING_ANALYST_EMAIL",
              "STAGING_ANALYST_PASSWORD",
              "STAGING_TEST_WORKSPACE_ID",
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit("Missing required secrets")
          uuid.UUID(os.environ["STAGING_TEST_WORKSPACE_ID"])
          if os.environ.get("STAGING_ALLOW_CONTROLLED_WRITES") != "true":
              raise SystemExit("Controlled writes are not enabled")
          if os.environ.get("STAGING_EXPECTED_ALEMBIC_REVISION") != "202607130021":
              raise SystemExit("Unexpected expected revision")
          if os.environ.get("STAGING_RUNTIME_ALEMBIC_REVISION") != "202607130021":
              raise SystemExit("Unexpected runtime revision")
          print("Safety inputs: PASS")
          PY

      - name: Warm backend health
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            code="$(curl -sS -o /tmp/sellora-health.json -w "%{http_code}" --max-time 20 "$STAGING_API_URL/health" || true)"
            if [ "$code" = "200" ]; then
              echo "Backend health warm-up: PASS"
              exit 0
            fi
            echo "Backend health attempt $attempt returned $code"
            sleep 10
          done
          echo "Backend health warm-up: FAIL"
          cat /tmp/sellora-health.json || true
          exit 1

      - name: Compile E2E runner
        run: python -m py_compile scripts/staging_controlled_write_e2e_rerun.py

      - name: Execute synthetic controlled-write flow
        id: execute
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          python scripts/staging_controlled_write_e2e_rerun.py > artifacts/controlled-write-console.log 2>&1
          code=$?
          echo "$code" > artifacts/controlled-write-exit-code.txt
          echo "runner_exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate evidence and sanitization
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifact = Path("artifacts/staging-controlled-write-e2e.json")
          if not artifact.exists():
              raise SystemExit("Controlled-write artifact missing")

          text_paths = [
              Path("artifacts/controlled-write-console.log"),
              artifact,
              Path("artifacts/staging-controlled-write-summary.json"),
          ]
          texts = {str(path): path.read_text(encoding="utf-8", errors="replace") if path.exists() else "" for path in text_paths}
          sensitive = {
              "OWNER_EMAIL": os.environ.get("STAGING_OWNER_EMAIL", ""),
              "OWNER_PASSWORD": os.environ.get("STAGING_OWNER_PASSWORD", ""),
              "ANALYST_EMAIL": os.environ.get("STAGING_ANALYST_EMAIL", ""),
              "ANALYST_PASSWORD": os.environ.get("STAGING_ANALYST_PASSWORD", ""),
              "WORKSPACE_ID": os.environ.get("STAGING_TEST_WORKSPACE_ID", ""),
          }
          leaks = []
          for label, value in sensitive.items():
              if not value:
                  continue
              for path, text in texts.items():
                  if value in text:
                      leaks.append(f"{label} in {path}")

          forbidden_markers = ["access_token", "refresh_token", "Authorization", "Bearer "]
          marker_hits = []
          for marker in forbidden_markers:
              for path, text in texts.items():
                  if marker in text:
                      marker_hits.append(f"{marker} in {path}")

          if leaks or marker_hits:
              print("Sanitization: FAIL")
              for item in leaks + marker_hits:
                  print(item)
              raise SystemExit(1)

          data = json.loads(artifact.read_text(encoding="utf-8"))
          if data.get("decision") != "PASS":
              print(json.dumps(data.get("issues", []), indent=2, ensure_ascii=False))
              raise SystemExit("Controlled-write decision is not PASS")
          if data.get("safety", {}).get("nova_poshta_routes_requested"):
              raise SystemExit("Nova Poshta route was requested")
          if data.get("safety", {}).get("migrations_executed") is not False:
              raise SystemExit("Migration safety evidence invalid")
          print("Evidence and sanitization: PASS")
          PY

      - name: Upload sanitized controlled-write evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8a1-controlled-write-rerun-${{ github.run_id }}
          path: |
            artifacts/staging-controlled-write-e2e.json
            artifacts/staging-controlled-write-summary.json
            artifacts/controlled-write-exit-code.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Publish sanitized summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifact = Path("artifacts/staging-controlled-write-e2e.json")
          lines = ["## Sprint 8A.1 Controlled-write E2E Rerun"]
          if artifact.exists():
              data = json.loads(artifact.read_text(encoding="utf-8"))
              checks = data.get("checks", {})
              lines.extend([
                  f"- Decision: **{data.get('decision', 'UNKNOWN')}**",
                  f"- Passed checks: **{sum(1 for value in checks.values() if value.get('status') == 'PASS')}**",
                  f"- Failed checks: **{sum(1 for value in checks.values() if value.get('status') == 'FAIL')}**",
                  f"- Warnings: **{len(data.get('warnings', []))}**",
                  f"- Cleanup actions: **{len(data.get('cleanup_actions', []))}**",
                  "- Nova Poshta routes requested: **0**" if not data.get("safety", {}).get("nova_poshta_routes_requested") else "- Nova Poshta routes requested: **FAIL**",
              ])
          else:
              lines.append("- Artifact: **MISSING**")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")
          PY

      - name: Enforce controlled-write gate decision
        if: always()
        shell: bash
        run: |
          code="$(cat artifacts/controlled-write-exit-code.txt 2>/dev/null || echo 99)"
          if [ "$code" != "0" ]; then
            echo "Controlled-write runner exit code: $code"
            exit 1
          fi
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("artifacts/staging-controlled-write-e2e.json").read_text(encoding="utf-8"))
          if data.get("decision") != "PASS":
              raise SystemExit(1)
          print("CONTROLLED-WRITE E2E RERUN GATE: PASS")
          PY
