name: Sprint 8B Staging Closure

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/staging_sprint_8b_closure.py"
      - "scripts/staging_sprint_8b_closure_v2.py"
      - ".github/workflows/sprint-8b-staging-closure.yml"

permissions:
  contents: read

concurrency:
  group: sellora-sprint-8b-staging-closure
  cancel-in-progress: true

jobs:
  staging-api-browser-closure:
    runs-on: ubuntu-24.04
    timeout-minutes: 80
    env:
      STAGING_FRONTEND_URL: https://sellora-web-staging.vercel.app
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_OWNER_EMAIL: ${{ secrets.STAGING_OWNER_EMAIL }}
      STAGING_OWNER_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}
      STAGING_MANAGER_EMAIL: ${{ secrets.STAGING_MANAGER_EMAIL }}
      STAGING_MANAGER_PASSWORD: ${{ secrets.STAGING_MANAGER_PASSWORD }}
      STAGING_ANALYST_EMAIL: ${{ secrets.STAGING_ANALYST_EMAIL }}
      STAGING_ANALYST_PASSWORD: ${{ secrets.STAGING_ANALYST_PASSWORD }}
      STAGING_TEST_WORKSPACE_ID: ${{ secrets.STAGING_TEST_WORKSPACE_ID }}

    steps:
      - name: Checkout temporary QA branch
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate secure inputs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re
          required = [
              "STAGING_FRONTEND_URL", "STAGING_API_URL",
              "STAGING_OWNER_EMAIL", "STAGING_OWNER_PASSWORD",
              "STAGING_MANAGER_EMAIL", "STAGING_MANAGER_PASSWORD",
              "STAGING_ANALYST_EMAIL", "STAGING_ANALYST_PASSWORD",
              "STAGING_TEST_WORKSPACE_ID",
          ]
          if any(not os.getenv(name) for name in required):
              raise SystemExit("Missing required Sprint 8B staging input")
          if not re.fullmatch(r"[0-9a-fA-F-]{36}", os.environ["STAGING_TEST_WORKSPACE_ID"]):
              raise SystemExit("Invalid STAGING_TEST_WORKSPACE_ID")
          print("Secure input preflight: PASS")
          PY

      - name: Warm staging frontend and backend
        shell: bash
        run: |
          set -euo pipefail
          ready=false
          for attempt in $(seq 1 10); do
            frontend_code="$(curl -sS -o /tmp/frontend.html -w "%{http_code}" --max-time 25 "$STAGING_FRONTEND_URL/login" || true)"
            backend_code="$(curl -sS -o /tmp/backend.json -w "%{http_code}" --max-time 25 "$STAGING_API_URL/health" || true)"
            echo "Warm-up $attempt: frontend=$frontend_code backend=$backend_code"
            if [[ "$frontend_code" =~ ^(200|301|302|307|308)$ ]] && [ "$backend_code" = "200" ]; then
              ready=true
              break
            fi
            sleep 8
          done
          [ "$ready" = "true" ] || { echo "Staging unavailable" >&2; exit 1; }

      - name: Install browser dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install httpx playwright
          python -m playwright install --with-deps chromium

      - name: Compile closure runners
        run: |
          python -m py_compile scripts/staging_sprint_8b_closure.py
          python -m py_compile scripts/staging_sprint_8b_closure_v2.py

      - name: Execute Sprint 8B staging closure
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/sprint-8b-closure
          python scripts/staging_sprint_8b_closure_v2.py > artifacts/sprint-8b-closure/console.log 2>&1
          code=$?
          echo "$code" > artifacts/sprint-8b-closure/exit-code.txt
          exit 0

      - name: Validate sanitized evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, pathlib, re
          root = pathlib.Path("artifacts/sprint-8b-closure")
          report_path = root / "sprint-8b-closure.json"
          md_path = root / "sprint-8b-closure.md"
          console_path = root / "console.log"
          if not report_path.exists() or not md_path.exists():
              raise SystemExit("Sprint 8B closure report missing")
          texts = [(p.name, p.read_text(encoding="utf-8", errors="replace")) for p in (report_path, md_path, console_path) if p.exists()]
          secret_values = [
              os.getenv("STAGING_OWNER_PASSWORD", ""),
              os.getenv("STAGING_MANAGER_PASSWORD", ""),
              os.getenv("STAGING_ANALYST_PASSWORD", ""),
          ]
          leaks = []
          for secret in secret_values:
              if not secret:
                  continue
              for filename, text in texts:
                  if secret in text:
                      leaks.append(f"credential value in {filename}")
          patterns = [
              re.compile(r"Bearer\s+[A-Za-z0-9._~+/=-]{20,}", re.I),
              re.compile(r"\beyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b"),
              re.compile(r"\bsk-[A-Za-z0-9_-]{12,}\b", re.I),
          ]
          for filename, text in texts:
              for pattern in patterns:
                  if pattern.search(text):
                      leaks.append(f"token/API-key pattern in {filename}")
          if leaks:
              raise SystemExit("Sanitization FAIL: " + ", ".join(leaks))
          report = json.loads(report_path.read_text(encoding="utf-8"))
          security = report.get("security", {})
          if not all(security.get(key) is True for key in ("passwords_suppressed", "tokens_suppressed", "authorization_headers_suppressed", "api_keys_suppressed")):
              raise SystemExit("Security evidence flags missing")
          print("Sanitized Sprint 8B evidence: PASS")
          if report.get("decision") != "PASS":
              print(json.dumps(report.get("findings", []), ensure_ascii=False, indent=2))
              raise SystemExit("Sprint 8B closure decision is not PASS")
          PY

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8b-staging-closure-${{ github.run_id }}
          path: artifacts/sprint-8b-closure
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce closure decision
        if: always()
        shell: bash
        run: |
          code="$(cat artifacts/sprint-8b-closure/exit-code.txt 2>/dev/null || echo 99)"
          [ "$code" = "0" ] || exit 1
          python - <<'PY'
          import json
          report = json.load(open("artifacts/sprint-8b-closure/sprint-8b-closure.json", encoding="utf-8"))
          if report.get("decision") != "PASS":
              raise SystemExit(1)
          print("SPRINT 8B STAGING CLOSURE: PASS")
          PY
