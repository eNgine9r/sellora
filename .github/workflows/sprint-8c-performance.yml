name: Sprint 8C Performance

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/staging_sprint_8c_performance.py"
      - ".github/workflows/sprint-8c-performance.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: sellora-sprint-8c-performance
  cancel-in-progress: true

jobs:
  performance:
    runs-on: ubuntu-24.04
    timeout-minutes: 85
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_OWNER_EMAIL: ${{ secrets.STAGING_OWNER_EMAIL }}
      STAGING_OWNER_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}
      STAGING_TEST_WORKSPACE_ID: ${{ secrets.STAGING_TEST_WORKSPACE_ID }}
      PHASE_B_BRANCH: qa/sprint-8c-phase-b-core-20260714

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Resolve successful Phase B core dependency
        id: phase_b
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          payload="$(curl -fsSL --get \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            --data-urlencode "branch=${PHASE_B_BRANCH}" \
            --data-urlencode "status=completed" \
            --data-urlencode "per_page=50" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs")"
          PHASE_B_PAYLOAD="$payload" python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(os.environ["PHASE_B_PAYLOAD"])
          matching = [
              run
              for run in payload.get("workflow_runs", [])
              if run.get("name") == "Sprint 8C Phase B Core"
          ]
          matching.sort(key=lambda run: (run.get("run_number", 0), run.get("created_at", "")), reverse=True)
          successful = [run for run in matching if run.get("conclusion") == "success"]
          selected = successful[0] if successful else None
          latest = matching[0] if matching else None
          evidence = {
              "decision": "PASS" if selected else "BLOCKED",
              "phase_b_branch": os.environ["PHASE_B_BRANCH"],
              "successful_run_id": selected.get("id") if selected else None,
              "latest_run": {
                  "id": latest.get("id"),
                  "status": latest.get("status"),
                  "conclusion": latest.get("conclusion"),
              } if latest else None,
              "reason": None if selected else "No completed successful Sprint 8C Phase B Core run exists for the QA branch",
          }
          Path("artifacts/sprint-8c-performance-dependency.json").write_text(
              json.dumps(evidence, indent=2),
              encoding="utf-8",
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"ready={'true' if selected else 'false'}\n")
              output.write(f"run_id={selected.get('id') if selected else ''}\n")
          print(
              "Phase B core dependency: PASS " + str(selected.get("id"))
              if selected
              else "Phase B core dependency: BLOCKED"
          )
          PY
      - name: Install QA dependency
        if: steps.phase_b.outputs.ready == 'true'
        run: python -m pip install httpx
      - name: Compile runner
        if: steps.phase_b.outputs.ready == 'true'
        run: python -m py_compile scripts/staging_sprint_8c_performance.py
      - name: Execute performance matrix
        if: steps.phase_b.outputs.ready == 'true'
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          python scripts/staging_sprint_8c_performance.py > /tmp/sprint-8c-performance.log 2>&1
          code=$?
          cat /tmp/sprint-8c-performance.log
          echo "$code" > artifacts/sprint-8c-performance-exit-code.txt
          exit 0
      - name: Validate sanitized performance evidence
        if: steps.phase_b.outputs.ready == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json, os, pathlib, re
          path = pathlib.Path("artifacts/sprint-8c-performance.json")
          if not path.exists():
              raise SystemExit("Performance artifact missing after performance runner execution")
          text = path.read_text(encoding="utf-8")
          for name in ("STAGING_OWNER_EMAIL", "STAGING_OWNER_PASSWORD"):
              value = os.getenv(name, "")
              if value and value in text:
                  raise SystemExit(f"Credential leaked: {name}")
          for pattern in (
              r"Bearer\s+[A-Za-z0-9._~+/=-]{20,}",
              r"\beyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b",
              r"38067\d{7}",
              r"qa8c_perf_",
          ):
              if re.search(pattern, text, re.I):
                  raise SystemExit("Raw credential or source-row marker found in performance artifact")
          data = json.loads(text)
          if data.get("decision") != "PASS":
              raise SystemExit("Sprint 8C performance decision is not PASS")
          datasets = data.get("datasets", [])
          if [item.get("rows") for item in datasets] != [100, 1000, 5000]:
              raise SystemExit("Performance dataset matrix is incomplete")
          if any(item.get("status") != "PASS" for item in datasets):
              raise SystemExit("Performance dataset failure remains")
          print("SPRINT 8C PERFORMANCE: PASS")
          PY
      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8c-performance-${{ github.run_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: 14
      - name: Enforce performance decision
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.phase_b.outputs.ready }}" != "true" ]; then
            echo "Sprint 8C performance is blocked until Phase B core has a successful completed run." >&2
            exit 1
          fi
          code="$(cat artifacts/sprint-8c-performance-exit-code.txt 2>/dev/null || echo 99)"
          [ "$code" = "0" ]
