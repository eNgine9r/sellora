name: Sellora CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: sellora-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  SECRET_KEY: ci-secret
  JWT_SECRET: ci-jwt-secret
  STAGING_NOVA_POSHTA_ALLOW_WRITES: "false"

jobs:
  patch-direct-ai-drawer:
    name: patch-direct-ai-drawer
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mobile-ui-standardization
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Move Direct AI panel to shared responsive Drawer
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('frontend/src/app/direct/page.tsx')
          s = p.read_text()
          changed = False
          if 'role="dialog"' in s and 'fixed inset-0 z-50 lg:hidden' in s:
              s = s.replace('  X,\n', '')
              s = s.replace('import { EmptyState, ErrorState, LoadingSkeleton } from "@/components/ui/states";', 'import { EmptyState, ErrorState, LoadingSkeleton } from "@/components/ui/states";\nimport { Drawer } from "@/components/ui/overlay";')
              old = '''      {aiPanelOpen ? (
        <div className="fixed inset-0 z-50 lg:hidden" role="dialog" aria-modal="true" aria-label={t("direct.aiPanel")}>
          <button
            type="button"
            className="absolute inset-0 bg-[var(--overlay-background)] backdrop-blur-sm"
            aria-label={t("actions.close")}
            onClick={() => setAiPanelOpen(false)}
          />
          <aside className="absolute inset-y-0 right-0 flex w-[92vw] max-w-md flex-col overflow-hidden bg-surface-1 shadow-2xl">
            <header className="flex items-center justify-between border-b border-border-subtle p-4">
              <div className="flex items-center gap-2">
                <Bot className="h-5 w-5 text-primary" />
                <h2 className="font-black">{t("direct.aiPanel")}</h2>
              </div>
              <button
                type="button"
                className="rounded-2xl p-2 text-text-secondary hover:bg-surface-hover"
                onClick={() => setAiPanelOpen(false)}
                aria-label={t("actions.close")}
              >
                <X className="h-5 w-5" />
              </button>
            </header>
            <div className="sellora-scrollbar min-h-0 flex-1 overflow-y-auto p-4">
              <AiPanel
                loading={suggestionsQuery.isLoading}
                suggestions={suggestionsQuery.data ?? []}
                onAnalyze={() => analysisMutation.mutate()}
                analyzing={analysisMutation.isPending}
                connectionStatus={statusQuery.data?.status ?? "DISCONNECTED"}
                embedded
              />
            </div>
          </aside>
        </div>
      ) : null}'''
              new = '''      <Drawer
        open={aiPanelOpen}
        title={t("direct.aiPanel")}
        onClose={() => setAiPanelOpen(false)}
      >
        <AiPanel
          loading={suggestionsQuery.isLoading}
          suggestions={suggestionsQuery.data ?? []}
          onAnalyze={() => analysisMutation.mutate()}
          analyzing={analysisMutation.isPending}
          connectionStatus={statusQuery.data?.status ?? "DISCONNECTED"}
          embedded
        />
      </Drawer>'''
              if old not in s:
                  raise SystemExit('Direct AI panel block not found')
              p.write_text(s.replace(old, new))
              changed = True
          for temp_path in [
              '.github/workflows/direct-ai-shared-drawer-patch.yml',
          ]:
              temp = Path(temp_path)
              if temp.exists():
                  temp.unlink()
                  changed = True
          if changed:
              Path('/tmp/direct-mobile-patched').write_text('true')
          PY
          if [ -f /tmp/direct-mobile-patched ]; then
            git config user.name "sellora-mobile-ui-bot"
            git config user.email "actions@users.noreply.github.com"
            git add frontend/src/app/direct/page.tsx .github/workflows/direct-ai-shared-drawer-patch.yml || true
            git commit -m "fix: use shared Drawer for Direct AI panel"
            git push origin HEAD:fix/mobile-ui-standardization
          fi

  backend-static:
    name: backend-static
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile application, migrations and scripts
        run: python -m compileall app alembic scripts -q
      - name: Verify single Alembic head
        run: |
          heads="$(alembic heads --verbose | grep -c '^Rev:' || true)"
          [ "$heads" = "1" ] || {
            alembic heads --verbose
            echo "Expected exactly one Alembic head, found $heads"
            exit 1
          }
          alembic heads

  backend-focused:
    name: backend-focused
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Run high-risk fulfillment and Nova Poshta suites
        run: |
          python -m pytest -q \
            tests/test_phone.py \
            tests/test_crm_completion.py \
            tests/test_nova_poshta.py \
            tests/test_sprint_8f_foundation_migration.py \
            tests/test_order_fulfillment.py \
            tests/test_order_fulfillment_workflow.py \
            tests/test_order_fulfillment_api.py \
            tests/test_order_fulfillment_finance.py \
            tests/test_order_fulfillment_consolidation_migration.py \
            tests/integrations/fulfillment/test_fulfillment_provider_reconciliation.py \
            tests/integrations/nova_poshta/test_real_provider_payload.py \
            tests/integrations/nova_poshta/test_durable_ttn_workflow.py \
            tests/ai/test_ai_foundation.py \
            tests/test_meta_instagram_foundation.py \
            tests/integrations/meta_instagram

  security-and-tenant-isolation:
    name: security-and-tenant-isolation
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Run security, import provenance and operational invariants
        run: |
          python -m pytest -q \
            tests/security/test_endpoint_inventory.py \
            tests/security/test_tenant_object_isolation.py \
            tests/security/test_workspace_injection.py \
            tests/test_health_runtime_identity.py \
            tests/imports/test_import_execution_guard.py \
            tests/imports/test_import_source_storage.py \
            tests/imports/test_import_center_pilot_hardening.py \
            tests/imports/test_import_pilot_scope_safety.py \
            tests/imports/test_import_formula_rejection.py \
            tests/imports/test_import_inventory_plan.py \
            tests/imports/test_import_xlsx_content.py \
            tests/imports/test_import_historical_value_validation.py \
            tests/onboarding/test_onboarding_status.py \
            tests/onboarding/test_demo_workspace_service.py \
            tests/test_orders.py \
            tests/orders/test_order_lifecycle_pilot.py \
            tests/orders/test_sprint_8d_locking_contract.py \
            tests/inventory/test_inventory_operational_invariants.py \
            tests/test_shipments.py \
            tests/shipments/test_local_shipment_pilot.py \
            tests/test_meta_instagram_foundation.py \
            tests/integrations/meta_instagram

  backend-full:
    name: backend-full
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Run full backend suite
        run: python -m pytest tests -q

  postgresql-integration:
    name: postgresql-integration
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sellora_test
          POSTGRES_USER: sellora
          POSTGRES_PASSWORD: sellora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sellora -d sellora_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://sellora:sellora@localhost:5432/sellora_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Run Sprint 8F foundation migration gate
        run: python scripts/sprint_8f_migration_gate.py
      - name: Run canonical migration downgrade and re-upgrade gate
        run: |
          alembic upgrade head
          alembic downgrade 202607180028
          alembic upgrade head
          alembic current
      - name: Run PostgreSQL concurrency and consolidation tests
        run: |
          python -m pytest -q \
            tests/integrations/fulfillment/test_fulfillment_concurrency_postgres.py \
            tests/test_order_fulfillment_consolidation_migration.py \
            tests/test_meta_instagram_foundation.py \
            tests/integrations/meta_instagram

  frontend-production:
    name: frontend-production
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Production build
        working-directory: frontend
        run: npm run build
      - name: Run import-center static regression
        run: node frontend/scripts/import-center-pilot-regression.mjs
      - name: Run orders, inventory and shipments static regression
        run: node frontend/scripts/orders-inventory-shipments-pilot-regression.mjs
      - name: Run Nova Poshta static regression
        run: node frontend/scripts/nova-poshta-real-validation-regression.mjs
      - name: Run Direct and Meta Instagram static regressions
        run: |
          node frontend/scripts/direct-app-shell-regression.mjs
          node frontend/scripts/meta-instagram-regression.mjs
