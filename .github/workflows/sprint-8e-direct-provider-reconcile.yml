name: Sprint 8E Direct Provider Reconciliation Proof

on:
  pull_request:
    branches: [main]
    paths:
      - "qa/sprint_8e_direct_provider_reconcile.py"
      - ".github/workflows/sprint-8e-direct-provider-reconcile.yml"

permissions:
  contents: read

concurrency:
  group: sprint-8e-direct-provider-reconcile
  cancel-in-progress: false

jobs:
  direct-provider-reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_FRONTEND_URL: https://sellora-web-staging.vercel.app
      EXPECTED_RUNTIME_COMMIT: f7f5aea9e56e5aed83a011dd5d10da7cf85c4c22
      QA8E_WORKSPACE_ID: 5ae30ca3-a4d7-4cc1-8bba-335f2b8c1ef4
      NOVA_POSHTA_API_URL: https://api.novaposhta.ua/v2.0/json/
      STAGING_OWNER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'EMAIL')] }}
      STAGING_OWNER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'PASSWORD')] }}
      STAGING_MANAGER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'MANAGER', 'EMAIL')] }}
      STAGING_MANAGER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'MANAGER', 'PASSWORD')] }}
      STAGING_ANALYST_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'ANALYST', 'EMAIL')] }}
      STAGING_ANALYST_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'ANALYST', 'PASSWORD')] }}
      STAGING_NOVA_POSHTA_API_KEY: ${{ secrets[format('STAGING_NOVA_POSHTA_{0}', 'API_KEY')] }}
      STAGING_NOVA_POSHTA_SENDER_CITY_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'CITY', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_WAREHOUSE_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'WAREHOUSE', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_COUNTERPARTY_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'COUNTERPARTY', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_CONTACT_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'CONTACT', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_PHONE: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}', 'PHONE')] }}

    steps:
      - name: Checkout one-shot QA branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned QA dependency
        run: python -m pip install --disable-pip-version-check httpx==0.28.1

      - name: Compile one-shot proof
        run: python -m py_compile qa/sprint_8e_direct_provider_reconcile.py

      - name: Verify current durable reconciliation runtime
        run: |
          curl -fsSL --retry 8 --retry-all-errors --retry-delay 10 --max-time 120 \
            "$STAGING_API_URL/health" > /tmp/qa8e-health.json
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          health = json.loads(Path('/tmp/qa8e-health.json').read_text(encoding='utf-8'))
          commit = str(health.get('runtime_commit') or '').lower()
          expected = os.environ['EXPECTED_RUNTIME_COMMIT'].lower()
          print(json.dumps({
              'status': health.get('status'),
              'runtime_commit': commit,
              'process_started_at': health.get('process_started_at'),
          }, indent=2))
          if health.get('status') != 'ok' or not commit.startswith(expected[:12]):
              raise SystemExit('Unexpected runtime identity for one-shot reconciliation proof')
          PY

      - name: Execute one-shot provider save and Sellora reconciliation
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/sprint-8e
          python qa/sprint_8e_direct_provider_reconcile.py
          code=$?
          echo "$code" > artifacts/sprint-8e/direct-provider-reconcile-exit-code.txt
          exit 0

      - name: Validate sanitized proof artifact
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('artifacts/sprint-8e/direct-provider-reconcile.json')
          if not path.exists():
              raise SystemExit('Direct provider reconciliation artifact missing')
          report = json.loads(path.read_text(encoding='utf-8'))
          network = report.get('network') or {}
          print(json.dumps({
              'decision': report.get('decision'),
              'check_count': len(report.get('checks', [])),
              'provider_document_expected': report.get('provider_document_expected'),
              'provider_save_requests': network.get('provider_save_requests'),
              'reconcile_requests': network.get('reconcile_requests'),
              'create_ttn_requests': network.get('create_ttn_requests'),
              'restart_required': report.get('restart_required'),
              'cleanup_required': report.get('cleanup_required'),
              'provider_validation_errors': report.get('provider_validation_errors'),
              'safe_error': report.get('safe_error'),
          }, indent=2))
          if network.get('provider_save_requests') not in (0, 1):
              raise SystemExit('Provider save budget exceeded')
          PY

      - name: Upload sanitized reconciliation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8e-direct-provider-reconcile-${{ github.run_id }}
          path: |
            artifacts/sprint-8e/direct-provider-reconcile.json
            artifacts/sprint-8e/direct-provider-reconcile-exit-code.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce proof decision
        if: always()
        run: |
          code="$(cat artifacts/sprint-8e/direct-provider-reconcile-exit-code.txt 2>/dev/null || echo 99)"
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('artifacts/sprint-8e/direct-provider-reconcile.json').read_text(encoding='utf-8'))
          network = report.get('network') or {}
          if report.get('decision') != 'PASS_PENDING_RESTART_AND_CLEANUP':
              raise SystemExit(f"Sprint 8E proof decision: {report.get('decision')}")
          if report.get('provider_document_expected') != 1:
              raise SystemExit('Exactly one provider document was not confirmed')
          if network.get('provider_save_requests') != 1:
              raise SystemExit('Expected exactly one provider save request')
          if report.get('restart_required') is not True or report.get('cleanup_required') is not True:
              raise SystemExit('Restart and cleanup boundary not armed')
          PY
          test "$code" = "0"
