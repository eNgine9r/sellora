name: Sprint 8C Phase B Core

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/staging_sprint_8c_phase_b_core.py"
      - "scripts/staging_sprint_8c_phase_b_core_v2.py"
      - "scripts/staging_sprint_8c_phase_b_core_v3.py"
      - ".github/workflows/sprint-8c-phase-b-core.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sellora-sprint-8c-phase-b-core
  cancel-in-progress: true

jobs:
  phase-b-core:
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      EXPECTED_RUNTIME_COMMITS: 39c46dcf339990e491c9dfa25f1b75fad7c9289a
      REJECTED_RUNTIME_COMMITS: 96a95bca5e378d6dc6da5e6d9bddbb96d935d3b4,4515b6b7dc3b42fb80e9a9466c95b128a37947f8,ff5e05ee6a4f3b4d2a1a87047cbf3d6e65189ee3
      MIN_PROCESS_STARTED_AT: "2026-07-15T08:00:00+00:00"
      STAGING_OWNER_EMAIL: ${{ secrets.STAGING_OWNER_EMAIL }}
      STAGING_OWNER_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}
      STAGING_MANAGER_EMAIL: ${{ secrets.STAGING_MANAGER_EMAIL }}
      STAGING_MANAGER_PASSWORD: ${{ secrets.STAGING_MANAGER_PASSWORD }}
      STAGING_ANALYST_EMAIL: ${{ secrets.STAGING_ANALYST_EMAIL }}
      STAGING_ANALYST_PASSWORD: ${{ secrets.STAGING_ANALYST_PASSWORD }}
      STAGING_TEST_WORKSPACE_ID: ${{ secrets.STAGING_TEST_WORKSPACE_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install QA dependency
        run: python -m pip install httpx
      - name: Compile runners
        run: |
          python -m py_compile scripts/staging_sprint_8c_phase_b_core.py
          python -m py_compile scripts/staging_sprint_8c_phase_b_core_v2.py
          python -m py_compile scripts/staging_sprint_8c_phase_b_core_v3.py
      - name: Execute Phase B core
        id: phase_b_execution
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          python scripts/staging_sprint_8c_phase_b_core_v3.py > /tmp/sprint-8c-phase-b-core.log 2>&1
          code=$?
          cat /tmp/sprint-8c-phase-b-core.log
          echo "$code" > artifacts/sprint-8c-phase-b-core-exit-code.txt
          exit 0
      - name: Validate sanitized evidence
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          python - <<'PY'
          import json, os, pathlib
          path = pathlib.Path("artifacts/sprint-8c-phase-b-core.json")
          if not path.exists():
              raise SystemExit("Phase B artifact missing after runner execution")
          text = path.read_text(encoding="utf-8")
          for name in (
              "STAGING_OWNER_EMAIL", "STAGING_OWNER_PASSWORD",
              "STAGING_MANAGER_EMAIL", "STAGING_MANAGER_PASSWORD",
              "STAGING_ANALYST_EMAIL", "STAGING_ANALYST_PASSWORD",
          ):
              value = os.getenv(name, "")
              if value and value in text:
                  raise SystemExit(f"Credential leaked: {name}")
          lowered = text.lower()
          for marker in ("authorization", "bearer ", "refresh_token", "access_token", "traceback", "postgresql+psycopg"):
              if marker in lowered:
                  raise SystemExit(f"Unsafe artifact marker: {marker}")
          data = json.loads(text)
          if not isinstance(data.get("checks"), list):
              raise SystemExit("Phase B evidence has invalid structure")
          print(f"Sprint 8C Phase B evidence sanitized: {data.get('decision')} ({len(data.get('checks', []))} checks)")
          PY
      - name: Upload sanitized Phase B evidence
        if: ${{ always() && hashFiles('artifacts/sprint-8c-phase-b-core.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8c-phase-b-core-${{ github.run_id }}
          path: artifacts/sprint-8c-phase-b-core.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Enforce Phase B decision
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          code="$(cat artifacts/sprint-8c-phase-b-core-exit-code.txt 2>/dev/null || echo 99)"
          python - "$code" <<'PY'
          import json
          import pathlib
          import sys

          code = int(sys.argv[1])
          path = pathlib.Path("artifacts/sprint-8c-phase-b-core.json")
          data = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}
          failed = [item for item in data.get("checks", []) if item.get("status") != "PASS"]
          if code != 0 or data.get("decision") != "PASS" or failed:
              reason = data.get("safe_error") or "Phase B core decision is not PASS"
              raise SystemExit(reason)
          print(f"SPRINT 8C PHASE B CORE: PASS ({len(data.get('checks', []))} checks)")
          PY
