name: Instagram History Staging Closure

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/instagram-history-staging-closure.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sellora-instagram-history-staging-closure
  cancel-in-progress: false

jobs:
  synchronize-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: staging
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_OWNER_EMAIL: ${{ secrets.STAGING_OWNER_EMAIL }}
      STAGING_OWNER_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate required staging credentials
        shell: bash
        run: |
          missing=0
          for key in STAGING_OWNER_EMAIL STAGING_OWNER_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "Required secret is missing: $key"
              missing=1
            fi
          done
          [ "$missing" = "0" ]

      - name: Subscribe status webhooks and synchronize history
        shell: bash
        run: |
          mkdir -p artifacts
          python - <<'PY'
          import json
          import os
          import time
          from collections import Counter
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          api = f"{os.environ['STAGING_API_URL'].rstrip('/')}/api/v1"

          def request(path, *, method="GET", token=None, workspace=None, body=None, timeout=30):
              headers = {"Accept": "application/json"}
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              if workspace:
                  headers["X-Workspace-ID"] = workspace
              data = None
              if body is not None:
                  data = json.dumps(body).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              req = Request(f"{api}{path}", data=data, method=method, headers=headers)
              try:
                  with urlopen(req, timeout=timeout) as response:
                      raw = response.read().decode("utf-8")
                      return response.status, json.loads(raw) if raw else {}
              except HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  try:
                      payload = json.loads(raw) if raw else {}
                  except json.JSONDecodeError:
                      payload = {"detail": "non-json response"}
                  return exc.code, payload
              except (URLError, TimeoutError) as exc:
                  return 0, {"detail": exc.__class__.__name__}

          code, tokens = request(
              "/auth/login",
              method="POST",
              body={
                  "email": os.environ["STAGING_OWNER_EMAIL"],
                  "password": os.environ["STAGING_OWNER_PASSWORD"],
              },
          )
          if code != 200 or not tokens.get("access_token"):
              raise SystemExit(f"Staging OWNER login failed with HTTP {code}")
          token = tokens["access_token"]

          code, current_user = request("/auth/me", token=token)
          if code != 200:
              raise SystemExit(f"Staging /auth/me failed with HTTP {code}")

          memberships = current_user.get("memberships") or []
          evidence = {
              "workspace_count": len(memberships),
              "connected_workspace_count": 0,
              "webhook_subscription_status_counts": {},
              "confirmed_webhook_field_counts": {},
              "history_sync_status_counts": {},
              "conversations_discovered": 0,
              "conversations_synced": 0,
              "messages_discovered": 0,
              "messages_imported": 0,
              "messages_existing": 0,
              "messages_unavailable": 0,
              "error_count": 0,
              "rate_limit_count": 0,
          }
          webhook_statuses = Counter()
          webhook_fields = Counter()
          sync_statuses = Counter()

          for membership in memberships:
              workspace_id = str(membership.get("workspace_id") or "")
              if not workspace_id:
                  continue

              code, status = request(
                  "/integrations/instagram/status",
                  token=token,
                  workspace=workspace_id,
              )
              if code != 200 or status.get("status") not in {"CONNECTED", "WEBHOOK_INACTIVE"} or not status.get("token_present"):
                  continue
              evidence["connected_workspace_count"] += 1

              code, subscribed = request(
                  "/integrations/instagram/webhooks/subscribe",
                  method="POST",
                  token=token,
                  workspace=workspace_id,
              )
              webhook_statuses[f"HTTP_{code}"] += 1
              if code != 200:
                  detail = subscribed.get("detail") if isinstance(subscribed, dict) else None
                  safe_code = detail.get("code") if isinstance(detail, dict) else None
                  raise SystemExit(f"Instagram webhook subscription failed: {safe_code or f'HTTP_{code}'}")
              if not subscribed.get("required_fields_confirmed") or not subscribed.get("webhook_active"):
                  raise SystemExit("Meta did not confirm all required Instagram webhook fields")
              for field in subscribed.get("confirmed_webhook_fields") or []:
                  webhook_fields[str(field)] += 1

              code, sync = request(
                  "/direct/history-sync",
                  method="POST",
                  token=token,
                  workspace=workspace_id,
                  body={"conversation_limit": 100, "messages_per_conversation": 20},
              )
              if code != 200:
                  detail = sync.get("detail") if isinstance(sync, dict) else None
                  safe_code = detail.get("code") if isinstance(detail, dict) else None
                  raise SystemExit(f"Instagram history sync request failed: {safe_code or f'HTTP_{code}'}")

              terminal = {"COMPLETED", "PARTIAL", "FAILED_SAFE"}
              for _ in range(120):
                  code, sync = request(
                      "/direct/history-sync",
                      token=token,
                      workspace=workspace_id,
                  )
                  if code == 200 and sync.get("status") in terminal:
                      break
                  time.sleep(5)
              else:
                  raise SystemExit("Instagram history sync did not reach a terminal status")

              sync_status = str(sync.get("status") or "UNKNOWN")
              sync_statuses[sync_status] += 1
              for key in (
                  "conversations_discovered",
                  "conversations_synced",
                  "messages_discovered",
                  "messages_imported",
                  "messages_existing",
                  "messages_unavailable",
                  "error_count",
                  "rate_limit_count",
              ):
                  evidence[key] += int(sync.get(key) or 0)
              if sync_status == "FAILED_SAFE":
                  raise SystemExit(f"Instagram history sync failed safely: {sync.get('last_error_code') or 'UNKNOWN'}")

          if evidence["connected_workspace_count"] == 0:
              raise SystemExit("No connected Instagram workspace was available for staging closure")

          evidence["webhook_subscription_status_counts"] = dict(webhook_statuses)
          evidence["confirmed_webhook_field_counts"] = dict(webhook_fields)
          evidence["history_sync_status_counts"] = dict(sync_statuses)
          with open("artifacts/instagram-history-staging-closure.json", "w", encoding="utf-8") as file:
              json.dump(evidence, file, indent=2, ensure_ascii=False)
          print(json.dumps(evidence, ensure_ascii=False))
          PY

      - name: Validate sanitized evidence
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          secrets = [
              os.getenv("STAGING_OWNER_EMAIL", ""),
              os.getenv("STAGING_OWNER_PASSWORD", ""),
          ]
          for path in Path("artifacts").glob("**/*"):
              if not path.is_file():
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              for secret in secrets:
                  if secret and secret in text:
                      raise SystemExit(f"Secret leaked into closure artifact: {path}")
          print("Sanitized Instagram history evidence: PASS")
          PY

      - name: Upload sanitized staging evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-instagram-history-staging-${{ github.run_id }}
          path: artifacts
          if-no-files-found: error
          retention-days: 7
