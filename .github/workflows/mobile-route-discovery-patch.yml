name: Exhaustive Mobile Route Audit Patch

on:
  push:
    branches: [fix/mobile-ui-standardization]
    paths: [.github/workflows/mobile-route-discovery-patch.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mobile-ui-standardization
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Discover all App Router pages automatically
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('frontend/scripts/mobile-ui-audit.mjs')
          s = p.read_text()
          old = re.compile(r'const routes = \[\n(?:.*\n)*?\];\n', re.MULTILINE)
          replacement = '''function walkPages(directory) {
            return fs.readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const target = path.join(directory, entry.name);
              return entry.isDirectory() ? walkPages(target) : [target];
            });
          }

          function discoverAppRoutes() {
            const appRoot = path.join(path.resolve(path.dirname(new URL(import.meta.url).pathname), ".."), "src", "app");
            const dynamicTemplates = [];
            const routes = walkPages(appRoot)
              .filter((file) => file.endsWith(`${path.sep}page.tsx`))
              .map((file) => {
                const relativeDirectory = path.relative(appRoot, path.dirname(file)).split(path.sep).filter((segment) => !segment.startsWith("(") && !segment.startsWith("@"));
                const route = relativeDirectory.length ? `/${relativeDirectory.join("/")}` : "/";
                if (route.includes("[") || route.includes("]")) dynamicTemplates.push(route);
                return route;
              })
              .filter((route) => !route.includes("[") && !route.includes("]"));
            return { routes: [...new Set(routes)].sort(), dynamicTemplates: [...new Set(dynamicTemplates)].sort() };
          }

          const discovered = discoverAppRoutes();
          const publicRoutes = discovered.routes.filter((route) => route === "/" || route === "/login" || route.startsWith("/legal/"));
          const protectedRoutes = discovered.routes.filter((route) => !publicRoutes.includes(route));
          '''
          s, count = old.subn(replacement, s, count=1)
          if count != 1:
            raise SystemExit('route array replacement failed')
          s = s.replace('const report = { baseUrl, apiBaseUrl, generatedAt: new Date().toISOString(), viewports: [], public: [], authenticated: false, fatalError: null };', 'const report = { baseUrl, apiBaseUrl, generatedAt: new Date().toISOString(), discoveredRoutes: discovered.routes, protectedRoutes, publicRoutes, dynamicTemplates: discovered.dynamicTemplates, viewports: [], public: [], authenticated: false, fatalError: null };')
          s = s.replace('for (const publicRoute of ["/", "/login"]) {', 'for (const publicRoute of publicRoutes) {')
          s = s.replace('for (const route of routes) {', 'for (const route of protectedRoutes) {')
          s = s.replace('`${routes.length} protected routes`', '`${protectedRoutes.length} protected routes`')
          p.write_text(s)
          PY
      - name: Remove one-time workflow and commit patch
        run: |
          git rm .github/workflows/mobile-route-discovery-patch.yml
          git config user.name "sellora-mobile-ui-bot"
          git config user.email "actions@users.noreply.github.com"
          git add frontend/scripts/mobile-ui-audit.mjs
          git commit -m "test: audit every static App Router page"
          git push origin HEAD:fix/mobile-ui-standardization
