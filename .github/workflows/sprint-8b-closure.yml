name: Sprint 8B Closure

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docs/**"
      - ".github/workflows/sprint-8b-closure.yml"

permissions:
  contents: read

jobs:
  backend-demo-onboarding:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Run Sprint 8B backend tests
        working-directory: backend
        run: |
          pytest \
            tests/onboarding/test_demo_workspace_service.py \
            tests/onboarding/test_onboarding_status.py \
            tests/security/test_endpoint_inventory.py \
            tests/security/test_workspace_injection.py \
            -q
      - name: Verify controlled rollback scenario was executed
        working-directory: backend
        run: pytest tests/onboarding/test_demo_workspace_service.py::test_demo_workspace_generation_rolls_back_on_failure -q

  frontend-demo-first-run:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Typecheck
        run: npm --prefix frontend run typecheck
      - name: Lint
        run: npm --prefix frontend run lint
      - name: Production build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://sellora-api-staging.onrender.com/api/v1
        run: npm --prefix frontend run build
      - name: Run Sprint 8B static regression
        run: node frontend/scripts/demo-first-run-regression.mjs
