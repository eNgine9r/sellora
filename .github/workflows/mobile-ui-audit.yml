name: Mobile UI Audit

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/mobile-ui-audit.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mobile-ui-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch-direct-ai-drawer:
    name: migrate-direct-ai-drawer
    runs-on: ubuntu-24.04
    outputs:
      changed: ${{ steps.patch.outputs.changed }}
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/mobile-ui-standardization
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Move Direct AI panel to shared responsive Drawer
        id: patch
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('frontend/src/app/direct/page.tsx')
          s = p.read_text()
          changed = False
          if 'role="dialog"' in s and 'fixed inset-0 z-50 lg:hidden' in s:
              s = s.replace('  X,\n', '')
              s = s.replace('import { EmptyState, ErrorState, LoadingSkeleton } from "@/components/ui/states";', 'import { EmptyState, ErrorState, LoadingSkeleton } from "@/components/ui/states";\nimport { Drawer } from "@/components/ui/overlay";')
              old = '''      {aiPanelOpen ? (
        <div className="fixed inset-0 z-50 lg:hidden" role="dialog" aria-modal="true" aria-label={t("direct.aiPanel")}>
          <button
            type="button"
            className="absolute inset-0 bg-[var(--overlay-background)] backdrop-blur-sm"
            aria-label={t("actions.close")}
            onClick={() => setAiPanelOpen(false)}
          />
          <aside className="absolute inset-y-0 right-0 flex w-[92vw] max-w-md flex-col overflow-hidden bg-surface-1 shadow-2xl">
            <header className="flex items-center justify-between border-b border-border-subtle p-4">
              <div className="flex items-center gap-2">
                <Bot className="h-5 w-5 text-primary" />
                <h2 className="font-black">{t("direct.aiPanel")}</h2>
              </div>
              <button
                type="button"
                className="rounded-2xl p-2 text-text-secondary hover:bg-surface-hover"
                onClick={() => setAiPanelOpen(false)}
                aria-label={t("actions.close")}
              >
                <X className="h-5 w-5" />
              </button>
            </header>
            <div className="sellora-scrollbar min-h-0 flex-1 overflow-y-auto p-4">
              <AiPanel
                loading={suggestionsQuery.isLoading}
                suggestions={suggestionsQuery.data ?? []}
                onAnalyze={() => analysisMutation.mutate()}
                analyzing={analysisMutation.isPending}
                connectionStatus={statusQuery.data?.status ?? "DISCONNECTED"}
                embedded
              />
            </div>
          </aside>
        </div>
      ) : null}'''
              new = '''      <Drawer
        open={aiPanelOpen}
        title={t("direct.aiPanel")}
        onClose={() => setAiPanelOpen(false)}
      >
        <AiPanel
          loading={suggestionsQuery.isLoading}
          suggestions={suggestionsQuery.data ?? []}
          onAnalyze={() => analysisMutation.mutate()}
          analyzing={analysisMutation.isPending}
          connectionStatus={statusQuery.data?.status ?? "DISCONNECTED"}
          embedded
        />
      </Drawer>'''
              if old not in s:
                  raise SystemExit('Direct AI panel block not found')
              p.write_text(s.replace(old, new))
              changed = True
          temp = Path('.github/workflows/direct-ai-shared-drawer-patch.yml')
          if temp.exists():
              temp.unlink()
              changed = True
          Path('/tmp/mobile-ui-changed').write_text('true' if changed else 'false')
          PY
          echo "changed=$(cat /tmp/mobile-ui-changed)" >> "$GITHUB_OUTPUT"
      - name: Commit migration
        if: steps.patch.outputs.changed == 'true'
        run: |
          git config user.name "sellora-mobile-ui-bot"
          git config user.email "actions@users.noreply.github.com"
          git add frontend/src/app/direct/page.tsx .github/workflows/direct-ai-shared-drawer-patch.yml || true
          git commit -m "fix: use shared Drawer for Direct AI panel"
          git push origin HEAD:fix/mobile-ui-standardization

  mobile-ui-static:
    name: shared-mobile-contract
    needs: patch-direct-ai-drawer
    if: needs.patch-direct-ai-drawer.outputs.changed != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run shared mobile UI static regression
        working-directory: frontend
        run: npm run mobile:audit:static

  mobile-ui-audit:
    name: screenshots-and-boundaries
    needs: mobile-ui-static
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_API_BASE_URL: https://sellora-api-staging.onrender.com/api/v1
      NEXT_PUBLIC_API_TIMEOUT_MS: "90000"
      MOBILE_AUDIT_BASE_URL: http://127.0.0.1:3000
      STAGING_OWNER_EMAIL: ${{ secrets.STAGING_OWNER_EMAIL }}
      STAGING_OWNER_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install browser audit runtime
        working-directory: frontend
        run: |
          npm install --no-save --package-lock=false playwright@1.52.0
          npx playwright install --with-deps chromium
      - name: Build branch frontend
        working-directory: frontend
        run: npm run build
      - name: Start branch frontend
        working-directory: frontend
        run: |
          nohup npm run start -- -p 3000 > "$RUNNER_TEMP/sellora-mobile-ui-server.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/sellora-mobile-ui-server.pid"
      - name: Wait for local frontend
        shell: bash
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/login > /dev/null; then
              echo "Local Sellora frontend is ready"
              exit 0
            fi
            sleep 2
          done
          cat "$RUNNER_TEMP/sellora-mobile-ui-server.log"
          exit 1
      - name: Capture routes and inspect overlays
        run: node frontend/scripts/mobile-ui-audit.mjs
      - name: Normalize intentional table and tab scrollers
        run: node frontend/scripts/mobile-ui-normalize-report.mjs
      - name: Publish audit summary
        if: always() && hashFiles('artifacts/mobile-ui-audit/report.md') != ''
        run: cat artifacts/mobile-ui-audit/report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload screenshots and machine-readable report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-mobile-ui-audit-${{ github.run_id }}
          path: artifacts/mobile-ui-audit
          if-no-files-found: warn
          retention-days: 14
      - name: Print server log on failure
        if: failure()
        run: tail -n 200 "$RUNNER_TEMP/sellora-mobile-ui-server.log" || true
