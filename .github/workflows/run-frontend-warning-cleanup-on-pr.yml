name: Run frontend warning cleanup on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'fix/clear-frontend-build-warnings'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/clear-frontend-build-warnings
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply source fixes
        run: python .github/scripts/fix_frontend_warnings.py

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify clean production build
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/frontend-build.log
          if grep -q "Warning:" /tmp/frontend-build.log; then
            echo "Frontend build still contains warnings."
            exit 1
          fi

      - name: Commit source cleanup
        shell: bash
        run: |
          rm -f .github/warning-cleanup-trigger
          rm -f .github/scripts/fix_frontend_warnings.py
          rm -f .github/workflows/fix-frontend-warnings.yml
          rm -f .github/workflows/bootstrap-frontend-warning-cleanup.yml
          rm -f .github/workflows/run-frontend-warning-cleanup-on-pr.yml
          git config user.name "sellora-fix-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Clear frontend build warnings"
          git push origin HEAD:fix/clear-frontend-build-warnings
