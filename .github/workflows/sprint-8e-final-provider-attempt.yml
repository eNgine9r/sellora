name: Sprint 8E Final Provider Attempt

on:
  pull_request:
    branches: [main]
    paths:
      - "qa/sprint_8e_final_provider_attempt.py"
      - ".github/workflows/sprint-8e-final-provider-attempt.yml"

permissions:
  contents: read

concurrency:
  group: sprint-8e-final-provider-attempt
  cancel-in-progress: false

jobs:
  final-provider-attempt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_FRONTEND_URL: https://sellora-web-staging.vercel.app
      EXPECTED_RUNTIME_COMMIT: 44c2e1f85d72cb2c818d9468ad5287cbba5257ed
      QA8E_WORKSPACE_ID: 5ae30ca3-a4d7-4cc1-8bba-335f2b8c1ef4
      NOVA_POSHTA_API_URL: https://api.novaposhta.ua/v2.0/json/
      STAGING_OWNER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'EMAIL')] }}
      STAGING_OWNER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'PASSWORD')] }}
      STAGING_MANAGER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'MANAGER', 'EMAIL')] }}
      STAGING_MANAGER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'MANAGER', 'PASSWORD')] }}
      STAGING_ANALYST_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'ANALYST', 'EMAIL')] }}
      STAGING_ANALYST_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'ANALYST', 'PASSWORD')] }}
      STAGING_NOVA_POSHTA_API_KEY: ${{ secrets[format('STAGING_NOVA_POSHTA_{0}', 'API_KEY')] }}
      STAGING_NOVA_POSHTA_SENDER_CITY_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'CITY', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_WAREHOUSE_REF: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}_{1}', 'WAREHOUSE', 'REF')] }}
      STAGING_NOVA_POSHTA_SENDER_PHONE: ${{ secrets[format('STAGING_NOVA_POSHTA_SENDER_{0}', 'PHONE')] }}

    steps:
      - name: Checkout one-time QA branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned QA dependency
        run: python -m pip install --disable-pip-version-check httpx==0.28.1

      - name: Compile final provider runner
        run: python -m py_compile qa/sprint_8e_final_provider_attempt.py

      - name: Poll and verify exact Render runtime
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/sprint-8e
          : > artifacts/sprint-8e/runtime-poll.jsonl
          for attempt in $(seq 1 36); do
            if curl -fsSL --retry 2 --retry-all-errors --retry-delay 5 --max-time 90 \
              "$STAGING_API_URL/health" >/tmp/qa8e-health.json; then
              python - "$attempt" <<'PY'
          import json
          import os
          import sys
          from datetime import UTC, datetime
          from pathlib import Path

          attempt = int(sys.argv[1])
          health = json.loads(Path('/tmp/qa8e-health.json').read_text(encoding='utf-8'))
          commit = str(health.get('runtime_commit') or '').lower()
          expected = os.environ['EXPECTED_RUNTIME_COMMIT'].lower()
          snapshot = {
              'attempt': attempt,
              'checked_at': datetime.now(UTC).isoformat(),
              'status': health.get('status'),
              'runtime_commit': commit,
              'process_started_at': health.get('process_started_at'),
              'expected_match': health.get('status') == 'ok' and commit.startswith(expected[:12]),
          }
          with Path('artifacts/sprint-8e/runtime-poll.jsonl').open('a', encoding='utf-8') as stream:
              stream.write(json.dumps(snapshot) + '\n')
          print(json.dumps(snapshot, indent=2))
          raise SystemExit(0 if snapshot['expected_match'] else 1)
          PY
              if [ "$?" = "0" ]; then
                cp /tmp/qa8e-health.json artifacts/sprint-8e/runtime-health.json
                exit 0
              fi
            fi
            sleep 20
          done
          echo "Exact Render runtime was not observed" >&2
          exit 1

      - name: Execute one-time final provider attempt
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/sprint-8e
          python qa/sprint_8e_final_provider_attempt.py
          code=$?
          echo "$code" > artifacts/sprint-8e/final-provider-attempt-exit-code.txt
          exit 0

      - name: Validate sanitized final evidence
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('artifacts/sprint-8e/final-provider-attempt.json')
          if not path.exists():
              raise SystemExit('Sprint 8E final provider artifact missing')
          report = json.loads(path.read_text(encoding='utf-8'))
          print(json.dumps({
              'decision': report.get('decision'),
              'check_count': len(report.get('checks', [])),
              'provider_document_expected': report.get('provider_document_expected'),
              'restart_required': report.get('restart_required'),
              'cleanup_required': report.get('cleanup_required'),
              'network': report.get('network'),
              'safe_error': report.get('safe_error'),
          }, indent=2))
          if report.get('provider_document_expected') not in (0, 1):
              raise SystemExit('Unexpected provider document count')
          PY

      - name: Upload sanitized final evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8e-final-provider-attempt-${{ github.run_id }}
          path: |
            artifacts/sprint-8e/runtime-poll.jsonl
            artifacts/sprint-8e/runtime-health.json
            artifacts/sprint-8e/final-provider-attempt.json
            artifacts/sprint-8e/final-provider-attempt-exit-code.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce final provider decision
        if: always()
        run: |
          code="$(cat artifacts/sprint-8e/final-provider-attempt-exit-code.txt 2>/dev/null || echo 99)"
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('artifacts/sprint-8e/final-provider-attempt.json')
          if not path.exists():
              raise SystemExit('Sprint 8E final provider report missing')
          report = json.loads(path.read_text(encoding='utf-8'))
          if report.get('decision') != 'PASS_PENDING_RESTART_AND_CLEANUP':
              raise SystemExit(f"Sprint 8E final provider decision: {report.get('decision')}")
          if report.get('provider_document_expected') != 1:
              raise SystemExit('Exactly one provider document was not confirmed')
          if report.get('restart_required') is not True or report.get('cleanup_required') is not True:
              raise SystemExit('Restart/cleanup boundary not armed')
          PY
          test "$code" = "0"
