name: Sprint 8E Post-Restart Proof

on:
  pull_request:
    branches: [main]
    paths:
      - "qa/sprint_8e_post_restart_proof.py"
      - ".github/workflows/sprint-8e-post-restart-proof.yml"

permissions:
  contents: read

concurrency:
  group: sprint-8e-post-restart-proof
  cancel-in-progress: false

jobs:
  post-restart-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_FRONTEND_URL: https://sellora-web-staging.vercel.app
      EXPECTED_RUNTIME_COMMIT: 1f74145819ec6d3d70dd010c8dd4956ae560f287
      QA8E_WORKSPACE_ID: 5ae30ca3-a4d7-4cc1-8bba-335f2b8c1ef4
      STAGING_OWNER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'EMAIL')] }}
      STAGING_OWNER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'PASSWORD')] }}
      STAGING_MANAGER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'MANAGER', 'EMAIL')] }}
      STAGING_MANAGER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'MANAGER', 'PASSWORD')] }}
      STAGING_ANALYST_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'ANALYST', 'EMAIL')] }}
      STAGING_ANALYST_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'ANALYST', 'PASSWORD')] }}

    steps:
      - name: Checkout one-shot QA branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned dependency
        run: python -m pip install --disable-pip-version-check httpx==0.28.1

      - name: Compile restart proof
        run: python -m py_compile qa/sprint_8e_post_restart_proof.py

      - name: Poll for exact post-restart runtime
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/sprint-8e
          : > artifacts/sprint-8e/post-restart-runtime-poll.jsonl
          for attempt in $(seq 1 36); do
            if curl -fsSL --retry 2 --retry-all-errors --retry-delay 5 --max-time 90 \
              "$STAGING_API_URL/health" >/tmp/qa8e-health.json; then
              python - "$attempt" <<'PY'
          import json
          import os
          import sys
          from datetime import UTC, datetime
          from pathlib import Path

          attempt = int(sys.argv[1])
          health = json.loads(Path('/tmp/qa8e-health.json').read_text(encoding='utf-8'))
          commit = str(health.get('runtime_commit') or '').lower()
          expected = os.environ['EXPECTED_RUNTIME_COMMIT'].lower()
          started_at = str(health.get('process_started_at') or '')
          snapshot = {
              'attempt': attempt,
              'checked_at': datetime.now(UTC).isoformat(),
              'status': health.get('status'),
              'runtime_commit': commit,
              'process_started_at': started_at,
              'expected_match': health.get('status') == 'ok' and commit.startswith(expected[:12]),
          }
          with Path('artifacts/sprint-8e/post-restart-runtime-poll.jsonl').open('a', encoding='utf-8') as stream:
              stream.write(json.dumps(snapshot) + '\n')
          print(json.dumps(snapshot, indent=2))
          raise SystemExit(0 if snapshot['expected_match'] else 1)
          PY
              if [ "$?" = "0" ]; then
                cp /tmp/qa8e-health.json artifacts/sprint-8e/post-restart-health.json
                exit 0
              fi
            fi
            sleep 20
          done
          echo "Exact post-restart runtime was not observed" >&2
          exit 1

      - name: Execute post-restart durable reuse proof
        shell: bash
        run: |
          set +e
          python qa/sprint_8e_post_restart_proof.py
          code=$?
          echo "$code" > artifacts/sprint-8e/post-restart-proof-exit-code.txt
          exit 0

      - name: Validate sanitized restart evidence
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('artifacts/sprint-8e/post-restart-proof.json')
          if not path.exists():
              raise SystemExit('Post-restart proof artifact missing')
          report = json.loads(path.read_text(encoding='utf-8'))
          network = report.get('network') or {}
          print(json.dumps({
              'decision': report.get('decision'),
              'check_count': len(report.get('checks', [])),
              'restart_boundary_passed': report.get('restart_boundary_passed'),
              'create_ttn_requests': network.get('create_ttn_requests'),
              'sync_requests': network.get('sync_requests'),
              'http_5xx': network.get('http_5xx'),
              'provider_cleanup_required': report.get('provider_cleanup_required'),
              'local_cleanup_required': report.get('local_cleanup_required'),
              'safe_error': report.get('safe_error'),
          }, indent=2))
          if int(network.get('http_5xx') or 0) != 0:
              raise SystemExit('Unexpected HTTP 5xx after restart')
          PY

      - name: Upload post-restart evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8e-post-restart-proof-${{ github.run_id }}
          path: |
            artifacts/sprint-8e/post-restart-runtime-poll.jsonl
            artifacts/sprint-8e/post-restart-health.json
            artifacts/sprint-8e/post-restart-proof.json
            artifacts/sprint-8e/post-restart-proof-exit-code.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Enforce restart decision
        if: always()
        run: |
          code="$(cat artifacts/sprint-8e/post-restart-proof-exit-code.txt 2>/dev/null || echo 99)"
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('artifacts/sprint-8e/post-restart-proof.json').read_text(encoding='utf-8'))
          if report.get('decision') != 'PASS_PENDING_PROVIDER_AND_LOCAL_CLEANUP':
              raise SystemExit(f"Post-restart decision: {report.get('decision')}")
          if report.get('restart_boundary_passed') is not True:
              raise SystemExit('Restart boundary did not pass')
          if report.get('provider_cleanup_required') is not True or report.get('local_cleanup_required') is not True:
              raise SystemExit('Cleanup boundary not armed')
          PY
          test "$code" = "0"
