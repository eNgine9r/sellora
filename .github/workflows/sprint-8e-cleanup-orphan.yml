name: Sprint 8E Cleanup Failed-Safe Orphan

on:
  pull_request:
    branches: [main]
    paths:
      - "qa/sprint_8e_cleanup_orphan.py"
      - ".github/workflows/sprint-8e-cleanup-orphan.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sprint-8e-cleanup-failed-safe-orphan
  cancel-in-progress: false

jobs:
  cleanup-orphan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      EXPECTED_RUNTIME_COMMIT: f7f5aea9e56e5aed83a011dd5d10da7cf85c4c22
      QA8E_WORKSPACE_ID: 5ae30ca3-a4d7-4cc1-8bba-335f2b8c1ef4
      STAGING_OWNER_EMAIL: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'EMAIL')] }}
      STAGING_OWNER_PASSWORD: ${{ secrets[format('STAGING_{0}_{1}', 'OWNER', 'PASSWORD')] }}

    steps:
      - name: Checkout QA-only branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pinned QA dependency
        run: python -m pip install --disable-pip-version-check httpx==0.28.1

      - name: Compile cleanup guard
        run: python -m py_compile qa/sprint_8e_cleanup_orphan.py

      - name: Execute exact failed-safe orphan cleanup
        shell: bash
        run: |
          set +e
          mkdir -p artifacts/sprint-8e
          python qa/sprint_8e_cleanup_orphan.py
          code=$?
          echo "$code" > artifacts/sprint-8e/orphan-cleanup-exit-code.txt
          exit 0

      - name: Validate sanitized cleanup evidence
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          path = Path("artifacts/sprint-8e/orphan-cleanup.json")
          if not path.exists():
              raise SystemExit("Sprint 8E orphan cleanup artifact missing")
          report = json.loads(path.read_text(encoding="utf-8"))
          print(json.dumps({
              "decision": report.get("decision"),
              "check_count": len(report.get("checks", [])),
              "network": report.get("network"),
              "target": report.get("target"),
          }, indent=2))
          encoded = json.dumps(report)
          for secret_name in ("STAGING_OWNER_EMAIL", "STAGING_OWNER_PASSWORD"):
              secret = os.environ.get(secret_name)
              if secret and secret in encoded:
                  raise SystemExit(f"Sanitization failed for {secret_name}")
          PY

      - name: Upload cleanup evidence
        if: always() && hashFiles('artifacts/sprint-8e/orphan-cleanup.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8e-orphan-cleanup-${{ github.run_id }}
          path: |
            artifacts/sprint-8e/orphan-cleanup.json
            artifacts/sprint-8e/orphan-cleanup-exit-code.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce cleanup decision
        if: always()
        run: |
          code="$(cat artifacts/sprint-8e/orphan-cleanup-exit-code.txt 2>/dev/null || echo 99)"
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("artifacts/sprint-8e/orphan-cleanup.json").read_text(encoding="utf-8"))
          if report.get("decision") != "PASS":
              raise SystemExit(f"Sprint 8E orphan cleanup decision: {report.get('decision')}")
          PY
          test "$code" = "0"
