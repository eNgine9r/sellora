name: Sprint 8B Cache Isolation Verification

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/sprint-8b-cache-isolation-verification.yml"

permissions:
  contents: read

jobs:
  verify-frontend-cache-isolation:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Typecheck
        run: npm --prefix frontend run typecheck
      - name: Lint
        run: npm --prefix frontend run lint
      - name: Production build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://sellora-api-staging.onrender.com/api/v1
        run: npm --prefix frontend run build
      - name: Sprint 8B static regression
        run: node frontend/scripts/demo-first-run-regression.mjs
