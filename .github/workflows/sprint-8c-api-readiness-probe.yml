name: Sprint 8C API Readiness Probe

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/sprint-8c-api-readiness-probe.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-readiness:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    env:
      STAGING_API_URL: https://sellora-api-staging.onrender.com
      STAGING_OWNER_EMAIL: ${{ secrets.STAGING_OWNER_EMAIL }}
      STAGING_OWNER_PASSWORD: ${{ secrets.STAGING_OWNER_PASSWORD }}
      STAGING_MANAGER_EMAIL: ${{ secrets.STAGING_MANAGER_EMAIL }}
      STAGING_MANAGER_PASSWORD: ${{ secrets.STAGING_MANAGER_PASSWORD }}
      STAGING_ANALYST_EMAIL: ${{ secrets.STAGING_ANALYST_EMAIL }}
      STAGING_ANALYST_PASSWORD: ${{ secrets.STAGING_ANALYST_PASSWORD }}
      STAGING_TEST_WORKSPACE_ID: ${{ secrets.STAGING_TEST_WORKSPACE_ID }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install probe dependency
        run: python -m pip install httpx
      - name: Probe authenticated read endpoints
        shell: bash
        run: |
          mkdir -p artifacts
          python - <<'PY'
          import json
          import os
          import time
          from pathlib import Path

          import httpx

          api = os.environ["STAGING_API_URL"].rstrip("/")
          workspace_a = os.environ["STAGING_TEST_WORKSPACE_ID"]
          workspace_b = "56e8a724-782a-4494-a3a7-0bbf7deb03b7"
          phase_a_job = "e0b6cd02-4272-40cb-ad4c-9084c2a35dff"
          result = {"decision": "FAIL", "checks": [], "runtime": {}}

          def record(name, method, path, **kwargs):
              started = time.perf_counter()
              try:
                  with httpx.Client(
                      timeout=httpx.Timeout(connect=15, read=20, write=20, pool=15),
                      follow_redirects=True,
                      headers={"Connection": "close", "Cache-Control": "no-cache"},
                  ) as client:
                      response = client.request(method, f"{api}{path}", **kwargs)
                  elapsed = round(time.perf_counter() - started, 3)
                  result["checks"].append({"name": name, "status_code": response.status_code, "seconds": elapsed})
                  return response
              except Exception as exc:
                  elapsed = round(time.perf_counter() - started, 3)
                  result["checks"].append({"name": name, "status_code": None, "seconds": elapsed, "error_type": type(exc).__name__})
                  return None

          def login(role):
              response = record(
                  f"{role} login",
                  "POST",
                  "/api/v1/auth/login",
                  json={
                      "email": os.environ[f"STAGING_{role}_EMAIL"],
                      "password": os.environ[f"STAGING_{role}_PASSWORD"],
                  },
              )
              if response is None or response.status_code != 200:
                  raise SystemExit(f"{role} login probe failed")
              token = response.json().get("access_token")
              if not token:
                  raise SystemExit(f"{role} token absent")
              return token

          health = record("health", "GET", "/health")
          if health is None or health.status_code != 200:
              raise SystemExit("health probe failed")
          health_body = health.json()
          result["runtime"] = {
              "runtime_commit": health_body.get("runtime_commit"),
              "process_started_at": health_body.get("process_started_at"),
          }

          owner_token = login("OWNER")
          owner_a = {"Authorization": f"Bearer {owner_token}", "X-Workspace-ID": workspace_a}
          owner_b = {"Authorization": f"Bearer {owner_token}", "X-Workspace-ID": workspace_b}

          me = record("auth me", "GET", "/api/v1/auth/me", headers=owner_a)
          customers_a = record(
              "restart customers Workspace A",
              "GET",
              "/api/v1/customers",
              headers=owner_a,
              params={"search": "QA8C Restart Customer"},
          )
          logs_a = record(
              "Phase A logs Workspace A",
              "GET",
              f"/api/v1/import/{phase_a_job}/logs",
              headers=owner_a,
          )
          customers_b = record(
              "restart customers Workspace B",
              "GET",
              "/api/v1/customers",
              headers=owner_b,
              params={"search": "QA8C Restart Customer"},
          )
          logs_b = record(
              "Phase A logs Workspace B denied",
              "GET",
              f"/api/v1/import/{phase_a_job}/logs",
              headers=owner_b,
          )

          manager_token = login("MANAGER")
          analyst_token = login("ANALYST")
          manager_headers = {"Authorization": f"Bearer {manager_token}", "X-Workspace-ID": workspace_a}
          analyst_headers = {"Authorization": f"Bearer {analyst_token}", "X-Workspace-ID": workspace_a}
          denied_file = {"file": ("denied.csv", b"Name\nDenied\n", "text/csv")}
          manager_upload = record(
              "MANAGER import upload denied",
              "POST",
              "/api/v1/import/upload",
              headers=manager_headers,
              files=denied_file,
          )
          analyst_upload = record(
              "ANALYST import upload denied",
              "POST",
              "/api/v1/import/upload",
              headers=analyst_headers,
              files=denied_file,
          )

          required_200 = (me, customers_a, logs_a, customers_b)
          if not all(response is not None and response.status_code == 200 for response in required_200):
              raise SystemExit("authenticated readiness probe failed")
          if logs_b is None or logs_b.status_code not in {400, 404}:
              raise SystemExit("Workspace B log isolation failed")
          if manager_upload is None or manager_upload.status_code != 403:
              raise SystemExit("MANAGER mutation denial failed")
          if analyst_upload is None or analyst_upload.status_code != 403:
              raise SystemExit("ANALYST mutation denial failed")

          customers_a_body = customers_a.json()
          customers_b_body = customers_b.json()
          logs_a_body = logs_a.json()
          result["customer_count_workspace_a"] = len(customers_a_body) if isinstance(customers_a_body, list) else None
          result["customer_count_workspace_b"] = len(customers_b_body) if isinstance(customers_b_body, list) else None
          result["log_count"] = len(logs_a_body) if isinstance(logs_a_body, list) else None
          result["raw_data_absent"] = bool(isinstance(logs_a_body, list) and all(item.get("raw_data") is None for item in logs_a_body))
          if result["customer_count_workspace_a"] != 2 or result["customer_count_workspace_b"] != 0 or result["log_count"] != 2 or not result["raw_data_absent"]:
              raise SystemExit("Phase A read-only evidence mismatch")
          result["decision"] = "PASS"
          Path("artifacts/sprint-8c-api-readiness.json").write_text(json.dumps(result, indent=2), encoding="utf-8")
          print(json.dumps(result, indent=2))
          PY
      - name: Upload sanitized readiness evidence
        if: ${{ always() && hashFiles('artifacts/sprint-8c-api-readiness.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: sellora-sprint-8c-api-readiness-${{ github.run_id }}
          path: artifacts/sprint-8c-api-readiness.json
          if-no-files-found: ignore
          retention-days: 3
