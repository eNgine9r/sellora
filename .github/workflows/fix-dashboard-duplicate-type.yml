name: Fix dashboard duplicate type

on:
  push:
    branches:
      - codex/2026-07-10-implement-dark-design-system-for-sellora-d6o72o
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-dashboard-type:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove duplicate DashboardTopProductItem declaration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source_path = Path("frontend/src/app/dashboard/page.tsx")
          workflow_path = Path(".github/workflows/fix-dashboard-duplicate-type.yml")
          source = source_path.read_text(encoding="utf-8")
          declaration = """type DashboardTopProductItem = TopProduct & {
            sku?: string | null;
            category?: string | null;
            image_url?: string | null;
          };"""

          first = source.find(declaration)
          second = source.find(declaration, first + len(declaration)) if first >= 0 else -1
          if first < 0 or second < 0:
              raise SystemExit("Expected two DashboardTopProductItem declarations")

          source = source[:second] + source[second + len(declaration):]
          source_path.write_text(source, encoding="utf-8")
          workflow_path.unlink()
          PY

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "sellora-fix-bot"
          git config user.email "actions@users.noreply.github.com"
          git add frontend/src/app/dashboard/page.tsx .github/workflows/fix-dashboard-duplicate-type.yml
          git commit -m "Fix duplicate DashboardTopProductItem declaration"
          git push origin HEAD:${GITHUB_REF_NAME}
