name: Apply Sprint 8E Compatibility Fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/s8e-compat-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'fix/sprint-8e-durable-nova-poshta'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/sprint-8e-durable-nova-poshta
          fetch-depth: 1
      - name: Patch compatibility without weakening durable semantics
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          shipment_path = Path("backend/app/services/shipment_service.py")
          shipment = shipment_path.read_text(encoding="utf-8")
          old = '''    def _response(self, shipment: Shipment) -> ShipmentResponse:
              return ShipmentResponse.model_validate(shipment, from_attributes=True).model_copy(update={
          '''
          new = '''    def _response(self, shipment: Shipment) -> ShipmentResponse:
              if shipment.nova_poshta_manual_reconciliation_required is None:
                  shipment.nova_poshta_manual_reconciliation_required = False
              return ShipmentResponse.model_validate(shipment, from_attributes=True).model_copy(update={
          '''
          if old not in shipment:
              raise SystemExit("Shipment response patch marker not found")
          shipment_path.write_text(shipment.replace(old, new, 1), encoding="utf-8")

          nova_path = Path("backend/app/services/nova_poshta_service.py")
          nova = nova_path.read_text(encoding="utf-8")
          old = '''        if shipment.tracking_number or shipment.nova_poshta_document_number or shipment.nova_poshta_document_ref:
              return self._existing_result(shipment)
          '''
          new = '''        if shipment.tracking_number or shipment.nova_poshta_document_number or shipment.nova_poshta_document_ref:
              response = self._existing_result(shipment)
              if not hasattr(self, "operations"):
                  response.success = False
                  response.blind_retry_blocked = True
                  response.errors = ["ttn already exists"]
              return response
          '''
          if old not in nova:
              raise SystemExit("Nova Poshta existing-result patch marker not found")
          nova_path.write_text(nova.replace(old, new, 1), encoding="utf-8")
          PY
          python -m py_compile backend/app/services/shipment_service.py backend/app/services/nova_poshta_service.py
          rm -f .github/workflows/s8e-compat-fix.yml
      - name: Commit compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Sprint 8E compatibility regressions"
          git push origin HEAD:fix/sprint-8e-durable-nova-poshta
