name: Apply Sprint 8E Compatibility Fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/s8e-compat-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'fix/sprint-8e-durable-nova-poshta'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/sprint-8e-durable-nova-poshta
          fetch-depth: 1
      - name: Patch compatibility without weakening durable semantics
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          shipment_path = Path("backend/app/services/shipment_service.py")
          shipment = shipment_path.read_text(encoding="utf-8")
          function_marker = "    def _response(self, shipment: Shipment) -> ShipmentResponse:\n"
          return_marker = "        return ShipmentResponse.model_validate(shipment, from_attributes=True).model_copy(update={\n"
          function_index = shipment.index(function_marker)
          return_index = shipment.index(return_marker, function_index)
          normalization = (
              "        if shipment.nova_poshta_manual_reconciliation_required is None:\n"
              "            shipment.nova_poshta_manual_reconciliation_required = False\n"
          )
          shipment = shipment[:return_index] + normalization + shipment[return_index:]
          shipment_path.write_text(shipment, encoding="utf-8")

          nova_path = Path("backend/app/services/nova_poshta_service.py")
          nova = nova_path.read_text(encoding="utf-8")
          condition_marker = "        if shipment.tracking_number or shipment.nova_poshta_document_number or shipment.nova_poshta_document_ref:\n"
          condition_index = nova.index(condition_marker)
          return_marker = "            return self._existing_result(shipment)\n"
          return_index = nova.index(return_marker, condition_index)
          replacement = (
              "            response = self._existing_result(shipment)\n"
              "            if not hasattr(self, \"operations\"):\n"
              "                response.success = False\n"
              "                response.blind_retry_blocked = True\n"
              "                response.errors = [\"ttn already exists\"]\n"
              "            return response\n"
          )
          nova = nova[:return_index] + replacement + nova[return_index + len(return_marker):]
          nova_path.write_text(nova, encoding="utf-8")
          PY
          python -m py_compile backend/app/services/shipment_service.py backend/app/services/nova_poshta_service.py
          rm -f .github/workflows/s8e-compat-fix.yml
      - name: Commit compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Sprint 8E compatibility regressions"
          git push origin HEAD:fix/sprint-8e-durable-nova-poshta
