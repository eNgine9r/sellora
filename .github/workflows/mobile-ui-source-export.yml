name: Mobile UI Source Export

on:
  push:
    branches:
      - fix/mobile-ui-standardization
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/.next' \
            --exclude='backend/.venv' \
            --exclude='**/__pycache__' \
            -czf sellora-source.tar.gz .

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: sellora-source
          path: sellora-source.tar.gz
          retention-days: 1
